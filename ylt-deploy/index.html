// ─── SEASON CALCULATOR ─────────────────────────────────────────────
// Returns geographically coherent season names.
// West Afrika uses Raining/Dry/Harmattan; Europe uses Winter/Spring/Summer/Autumn;
// other regions follow their own climate logic.
function getSeason(cityKey, gpsLat, month) {
  const m = month;
  const WA      = ['ileife','lagos','ibadan','abeokuta','osogbo','adoekiti','ogbomosho','ilorin','ondo','abuja','kano','cotonou','accra','lome','dakar','abidjan','conakry','freetown','bamako','niamey','yaounde','libreville'];
  const EA      = ['nairobi','kampala','dares','addisababa'];
  const N_AF    = ['cairo','casablanca','tunis'];
  const S_AF    = ['joburg','capetown','maputo','lusaka','harare','luanda'];
  const EU      = ['london','manchester','dublin','paris','madrid','barcelona','lisbon','berlin','amsterdam','brussels','rome','milan','vienna','zurich','stockholm','oslo','copenhagen','helsinki','moscow','istanbul','athens','warsaw','budapest','bucharest','kyiv'];
  const N_AM    = ['newyork','washington','atlanta','chicago','houston','dallas','losangeles','miami','toronto','montreal','vancouver','havana','portofspain','kingston','mexicocity','bogota'];
  const S_AM    = ['salvador','saopaulo','riodejaneiro','buenosaires','lima'];
  const M_EAST  = ['dubai','abudhabi','riyadh','jeddah','doha','kuwait','amman','beirut','tehran'];
  const S_ASIA  = ['mumbai','delhi','bangalore','kolkata','karachi','lahore','dhaka','colombo','kathmandu','yangon'];
  const SE_ASIA = ['singapore','bangkok','kualalumpur','jakarta','manila'];
  const E_ASIA  = ['tokyo','osaka','beijing','shanghai','seoul','taipei','hongkong'];
  const OCE     = ['sydney','melbourne','brisbane','perth','auckland'];

  let region = 'eu';
  if (cityKey === 'gps' && gpsLat !== null) {
    const la = gpsLat;
    if (la >= -12 && la <= 12)       region = 'wa';
    else if (la > 12 && la <= 32)    region = 'me';
    else if (la > 32)                region = 'eu';
    else if (la < -12 && la >= -35)  region = 's_af';
    else                             region = 'oce';
  } else {
    if      (WA.includes(cityKey))      region = 'wa';
    else if (EA.includes(cityKey))      region = 'ea';
    else if (N_AF.includes(cityKey))    region = 'n_af';
    else if (S_AF.includes(cityKey))    region = 's_af';
    else if (EU.includes(cityKey))      region = 'eu';
    else if (N_AM.includes(cityKey))    region = 'n_am';
    else if (S_AM.includes(cityKey))    region = 's_am';
    else if (M_EAST.includes(cityKey))  region = 'me';
    else if (S_ASIA.includes(cityKey))  region = 's_asia';
    else if (SE_ASIA.includes(cityKey)) region = 'se_asia';
    else if (E_ASIA.includes(cityKey))  region = 'e_asia';
    else if (OCE.includes(cityKey))     region = 'oce';
  }

  const NH = () => {  // Northern hemisphere 4-season
    if (m >= 3 && m <= 5)  return { name:'Spring', icon:'🌸' };
    if (m >= 6 && m <= 8)  return { name:'Summer', icon:'☀️' };
    if (m >= 9 && m <= 11) return { name:'Autumn', icon:'🍂' };
    return { name:'Winter', icon:'❄️' };
  };
  const SH = () => {  // Southern hemisphere 4-season (reversed)
    if (m >= 3 && m <= 5)  return { name:'Autumn', icon:'🍂' };
    if (m >= 6 && m <= 8)  return { name:'Winter', icon:'❄️' };
    if (m >= 9 && m <= 11) return { name:'Spring', icon:'🌸' };
    return { name:'Summer', icon:'☀️' };
  };

  switch (region) {
    case 'wa':     // West/Equatorial Afrika: Raining / Dry / Harmattan
      if (m >= 4 && m <= 10) return { name:'Raining Season', icon:'🌧️' };
      if (m === 3)           return { name:'Dry Season',     icon:'🌤️' };
      return                        { name:'Harmattan',      icon:'💨' };
    case 'ea':     // East Afrika: Long Rains / Cool Dry / Short Rains / Hot Dry
      if (m >= 3 && m <= 5)   return { name:'Long Rains',  icon:'🌧️' };
      if (m >= 6 && m <= 9)   return { name:'Cool Dry',    icon:'🌤️' };
      if (m >= 10 && m <= 12) return { name:'Short Rains', icon:'🌦️' };
      return                         { name:'Hot Dry',      icon:'☀️' };
    case 'n_af':   // North Afrika: Mediterranean-style
      return NH();
    case 's_af':   // Southern Afrika: reversed seasons
      return SH();
    case 'eu':     // Europe
    case 'e_asia': // East Asia (Japan, China, Korea)
    case 'n_am':   // North Americas
      return NH();
    case 's_am':   // South Americas
      return SH();
    case 'me':     // Middle East: Hot Season / Cool Season
      if (m >= 5 && m <= 9) return { name:'Hot Season',  icon:'🌡️' };
      return                       { name:'Cool Season', icon:'🌙' };
    case 's_asia': // South Asia: Hot / Monsoon / Cool
      if (m >= 6 && m <= 9) return { name:'Monsoon',     icon:'⛈️' };
      if (m >= 3 && m <= 5) return { name:'Hot Season',  icon:'🌡️' };
      return                       { name:'Cool Season', icon:'🌤️' };
    case 'se_asia': // SE Asia: Hot / Rainy / Cool
      if (m >= 6 && m <= 10) return { name:'Rainy Season', icon:'🌧️' };
      if (m >= 3 && m <= 5)  return { name:'Hot Season',   icon:'☀️' };
      return                        { name:'Cool Season',  icon:'🌤️' };
    case 'oce':    // Oceania (southern hemisphere)
      return SH();
    default:
      return NH();
  }
}


// ─── CELESTIAL MATHEMATICS ─────────────────────────────────────────
// Simplified but accurate enough for astrological/spiritual purposes.
// Based on Jean Meeus "Astronomical Algorithms" (Willmann-Bell, 1991).
const D2R = Math.PI / 180;
const R2D = 180 / Math.PI;

function calcJD(date) {
  // Julian Day Number from a JavaScript Date
  const Y = date.getUTCFullYear(), Mo = date.getUTCMonth() + 1, D = date.getUTCDate();
  const h = date.getUTCHours() + date.getUTCMinutes()/60 + date.getUTCSeconds()/3600;
  const A = Math.floor(Y/100), B = 2 - A + Math.floor(A/4);
  return Math.floor(365.25*(Y+4716)) + Math.floor(30.6001*(Mo+1)) + D + B - 1524.5 + h/24;
}

function norm360(x) { return ((x % 360) + 360) % 360; }

// Sun's ecliptic longitude (degrees)
function calcSunLon(jd) {
  const T = (jd - 2451545.0) / 36525;
  const L0 = norm360(280.46646 + 36000.76983*T + 0.0003032*T*T);
  const M  = norm360(357.52911 + 35999.05029*T - 0.0001537*T*T) * D2R;
  const C  = (1.914602 - 0.004817*T - 0.000014*T*T)*Math.sin(M)
           + (0.019993 - 0.000101*T)*Math.sin(2*M)
           + 0.000289*Math.sin(3*M);
  return norm360(L0 + C);
}

// Moon's ecliptic longitude (degrees, ~1° accuracy)
function calcMoonLon(jd) {
  const T  = (jd - 2451545.0) / 36525;
  const L1 = norm360(218.3165 + 481267.8813*T) * D2R;
  const M  = norm360(357.5291 + 35999.0503*T) * D2R;
  const Mm = norm360(134.9634 + 477198.8676*T) * D2R;
  const D2 = norm360(297.8502 + 445267.1115*T) * D2R;
  const F  = norm360(93.2721  + 483202.0175*T) * D2R;
  return norm360(L1*R2D
    + 6.2886*Math.sin(Mm)       + 1.2740*Math.sin(2*D2-Mm)
    + 0.6583*Math.sin(2*D2)     + 0.2136*Math.sin(2*Mm)
    - 0.1850*Math.sin(2*D2-2*Mm) - 0.1143*Math.sin(2*F)
    + 0.0588*Math.sin(2*D2-M)   + 0.0572*Math.sin(2*D2+Mm)
    + 0.0533*Math.sin(4*D2-Mm)  - 0.0498*Math.sin(M));
}

// Approximate ecliptic longitude for classical planets (degrees)
function calcPlanetLon(planet, jd) {
  const T = (jd - 2451545.0) / 36525;
  const P = {
    mercury: { L:252.2509, Ld:149472.6743, e:0.2056 },
    venus:   { L:181.9798, Ld:58517.8156,  e:0.0068 },
    mars:    { L:355.4330, Ld:19140.2993,  e:0.0934 },
    jupiter: { L:34.3515,  Ld:3034.9057,   e:0.0484 },
    saturn:  { L:50.0774,  Ld:1222.1139,   e:0.0542 },
  };
  const p = P[planet]; if (!p) return 0;
  const L = norm360(p.L + p.Ld * T);
  const M = norm360(p.L + p.Ld * T - (p.L + (p.Ld - 360/365.25)*T)) * D2R;
  const C = (2*p.e - p.e*p.e*p.e/4)*Math.sin(M) + 1.25*p.e*p.e*Math.sin(2*M);
  return norm360(L + C * R2D);
}

// Zodiac sign from ecliptic longitude
function getZodiac(lon) {
  const Z = [
    { name:'Aries',       sym:'♈' }, { name:'Taurus',      sym:'♉' },
    { name:'Gemini',      sym:'♊' }, { name:'Cancer',      sym:'♋' },
    { name:'Leo',         sym:'♌' }, { name:'Virgo',       sym:'♍' },
    { name:'Libra',       sym:'♎' }, { name:'Scorpio',     sym:'♏' },
    { name:'Sagittarius', sym:'♐' }, { name:'Capricorn',   sym:'♑' },
    { name:'Aquarius',    sym:'♒' }, { name:'Pisces',      sym:'♓' },
  ];
  return Z[Math.floor(((lon % 360) + 360) % 360 / 30)];
}

// Sirius visibility data
// Sirius approximate ecliptic longitude: ~104°
function getSiriusData(jd) {
  const sunLon = calcSunLon(jd);
  let elong = norm360(104 - sunLon);
  if (elong > 180) elong = 360 - elong;
  const visible = elong > 20;
  const morning = norm360(104 - sunLon) < 180;
  return {
    visible, elongation: Math.round(elong),
    visibility: morning ? 'morning' : 'evening',
    heliacalSoon: elong > 15 && elong < 25 && morning,
  };
}

function getApproxCoords() {
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if (TZ_COORDS[tz]) return { lat: TZ_COORDS[tz][0], lng: TZ_COORDS[tz][1], tz, exact: false };
  // Fallback: derive from UTC offset + region prefix
  const offsetMin = -new Date().getTimezoneOffset();
  const lng = Math.round(offsetMin * 0.25 * 10) / 10;
  const region = tz.split('/')[0];
  const latMap = { Africa:10, Europe:51, America:35, Asia:35, Australia:-28, Pacific:-15, Atlantic:38, Indian:-15 };
  const lat = latMap[region] ?? 15;
  return { lat, lng, tz, exact: false };
}

function tzCityName(tz) {
  // "Europe/Dublin" → "Dublin", "America/New_York" → "New York", "Afrika/Dar_es_Salaam" → "Dar es Salaam"
  const city = (tz.split('/').pop() || tz).replace(/_/g, ' ');
  return city;
}

// ─── SUNRISE CALCULATOR (NOAA simplified) ──────────────────────────
function getSunriseUTC(lat, lng, date) {
  const toR = d => d * Math.PI / 180;
  const toD = r => r * 180 / Math.PI;
  const zenith = 90.833;
  const lngH = lng / 15;
  const epoch = new Date(date.getFullYear(), 0, 0);
  const N = Math.floor((date - epoch) / 86400000);
  const t = N + ((6 - lngH) / 24);
  const M = (0.9856 * t) - 3.289;
  let L = M + (1.916 * Math.sin(toR(M))) + (0.020 * Math.sin(toR(2 * M))) + 282.634;
  L = ((L % 360) + 360) % 360;
  let RA = toD(Math.atan(0.91764 * Math.tan(toR(L))));
  RA = ((RA % 360) + 360) % 360;
  const Lq = Math.floor(L / 90) * 90;
  const RAq = Math.floor(RA / 90) * 90;
  RA = (RA + (Lq - RAq)) / 15;
  const sinDec = 0.39782 * Math.sin(toR(L));
  const cosDec = Math.cos(Math.asin(sinDec));
  const cosH = (Math.cos(toR(zenith)) - sinDec * Math.sin(toR(lat))) / (cosDec * Math.cos(toR(lat)));
  if (cosH > 1 || cosH < -1) return null;
  const H = (360 - toD(Math.acos(cosH))) / 15;
  const T = H + RA - (0.06571 * t) - 6.622;
  return ((T - lngH) % 24 + 24) % 24;
}

// Always returns seconds in Lagos WAT (UTC+1), regardless of browser timezone.
// YLT is anchored to Yorùbá land — Lagos is the canonical reference meridian.
function calcLocalSunriseSecs(lat, lng, date) {
  const utc = getSunriseUTC(lat, lng, date);
  if (utc === null) return 6 * 3600 + 59 * 60; // Lagos typical dawn fallback
  // WAT = UTC + 1 hour
  const lagosH = ((utc + 1) % 24 + 24) % 24;
  return Math.round(lagosH * 3600);
}

// Returns elapsed seconds since midnight in Lagos WAT (UTC+1), for any browser timezone.
function lagosTimeSecs(date) {
  const utcSecs = date.getUTCHours() * 3600 + date.getUTCMinutes() * 60 + date.getUTCSeconds();
  return (utcSecs + 3600) % 86400; // WAT = UTC + 1 h
}

// Yoruba vigesimal minute names (1-29 for "past", 1-29 for "to")
// Based on the base-20 subtraction/addition system
function yorubaMinuteName(n) {
  // n is 1–29
  const names = {
    1:  'ookan',
    2:  'eji',
    3:  'eta',
    4:  'erin',
    5:  'arun-un',
    6:  'efa',
    7:  'eje',
    8:  'ejo',
    9:  'esan',
    10: 'ewa',
    11: 'okanla',
    12: 'ejila',
    13: 'etala',
    14: 'erinla',
    15: 'eedogun',         // 20−5
    16: 'erindin logogun', // 20−4
    17: 'etadin logogun',  // 20−3
    18: 'ejidi logogun',   // 20−2
    19: 'okan din logogun',// 20−1
    20: 'ogun',
    21: 'okan le logogun', // 20+1
    22: 'eji le logogun',  // 20+2
    23: 'eta le logogun',  // 20+3
    24: 'erin le logogun', // 20+4
    25: 'eedogbon',        // 30−5
    26: 'erin din logbon', // 30−4
    27: 'eta din logbon',  // 30−3
    28: 'eji din logbon',  // 30−2
    29: 'okan din logbon', // 30−1
  };
  return names[n] || String(n);
}

// Build the full dynamic Yoruba spoken time phrase
function yltSpokenTime(yH, yM) {
  const hourName = YLT_SPOKEN_NAMES[yH - 1];
  const nextHour = YLT_SPOKEN_NAMES[yH % 16]; // wraps 16→0→Okan

  if (yM === 0)  return `Agogo ${hourName} ti lu`;
  if (yM === 30) return `Agogo ${hourName} ati abo ti lu`;

  if (yM < 30) {
    // "X minutes past hour N"
    return `Agogo ${hourName} koja iseju ${yorubaMinuteName(yM)}`;
  } else {
    // "X minutes to hour N+1"
    const remaining = 60 - yM;
    return `Iseju ${yorubaMinuteName(remaining)} ku si Agogo ${nextHour}`;
  }
}

// ─── YLT ENGINE ────────────────────────────────────────────────────
const SPD = 86400;
const SPH = 5400;  // seconds per YLT hour
const SPM = 90;    // seconds per YLT minute

function getYLT(date, dawnSecs) {
  const total = lagosTimeSecs(date); // always Lagos WAT, not browser local time
  const since = ((total - dawnSecs) % SPD + SPD) % SPD;
  const h = Math.floor(since / SPH) + 1;
  const rem = since % SPH;
  const m = Math.floor(rem / SPM);
  const s = rem % SPM;
  return { h, m, s, since };
}

function yltToStdSecs(yH, yM, dawnSecs) {
  return ((yH - 1) * SPH + yM * SPM + dawnSecs) % SPD;
}

function stdSecsToYLT(stdSecs, dawnSecs) {
  const since = ((stdSecs - dawnSecs) % SPD + SPD) % SPD;
  const yH = Math.floor(since / SPH) + 1;
  const rem = since % SPH;
  const yM = Math.floor(rem / SPM);
  return { yH, yM };
}

function fmt2(n) { return String(n).padStart(2, '0'); }
function fmtYLT(h, m, s) { return `${fmt2(h)}:${fmt2(m)}:${fmt2(s)}`; }
function fmtStdFull(date) {
  // Always display Lagos WAT (UTC+1), regardless of where the user's browser is.
  return date.toLocaleTimeString('en-IE', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false, timeZone: 'Africa/Lagos' });
}
function fmtTime12(secs) {
  const h = Math.floor(secs / 3600) % 24;
  const m = Math.floor((secs % 3600) / 60);
  const h12 = h % 12 || 12;
  return `${h12}:${fmt2(m)} ${h < 12 ? 'AM' : 'PM'}`;
}

// ─── COCK CROWS ─────────────────────────────────────────────────────
// Traditional Yorùbá time markers: the cock crows at four distinct moments
// throughout the natural day, each heralding a shift in energy.
// Times are encoded as YLT hours relative to a 6 AM dawn baseline.
const COCK_CROWS = [
  { yH:1,  yM:0,  name:'Ẹyẹ Owó Ojúmọ́',    meaning:'The Dawn Call',     meaning_yo:'Ìpè Ojúmọ́',       meaning_fr:'L\'Appel de l\'Aube',       meaning_es:'El Llamado del Alba',      note:'Triumphant crow at sunrise — the new YLT day begins' },
  { yH:13, yM:0,  name:'Ẹyẹ Owó Ọgànjọ́',  meaning:'The Midnight Call', meaning_yo:'Ìpè Ọgànjọ́',     meaning_fr:'L\'Appel de Minuit',        meaning_es:'El Llamado de Medianoche', note:'First crow near midnight — the deep night stirs' },
  { yH:14, yM:20, name:'Ẹyẹ Owó Alẹ́',      meaning:'The Second Call',   meaning_yo:'Ìpè Kejì',         meaning_fr:'Le Deuxième Appel',         meaning_es:'El Segundo Llamado',       note:'Second crow around 2 AM — the night at its deepest' },
  { yH:15, yM:40, name:'Ẹyẹ Owó Ìhòhò',    meaning:'The Pre-Dawn Call', meaning_yo:'Ìpè Ṣáájú Ojúmọ́', meaning_fr:'L\'Appel Avant l\'Aube',   meaning_es:'El Llamado Pre-Alba',      note:'Third crow before 4 AM — darkness before the coming dawn' },
];

function getNextCockCrow(since) {
  // 'since' = seconds elapsed in this YLT day (from getYLT)
  let nearest = null, minDiff = Infinity;
  COCK_CROWS.forEach(c => {
    const crowSince = (c.yH - 1) * SPH + c.yM * SPM;
    let diff = crowSince - since;
    if (diff <= 0) diff += SPD;  // wrap to next occurrence
    if (diff < minDiff) { minDiff = diff; nearest = { ...c, diff, crowSince }; }
  });
  const h = Math.floor(nearest.diff / 3600);
  const m = Math.floor((nearest.diff % 3600) / 60);
  const yH_c = Math.floor(nearest.crowSince / SPH) + 1;
  const yM_c = Math.floor((nearest.crowSince % SPH) / SPM);
  return { ...nearest, eta: h > 0 ? `${h}h ${m}m` : `${m}m`, ylt: `${fmt2(yH_c)}:${fmt2(yM_c)}` };
}

function getPhaseIdx(yH, yM) {
  const t = yH * 100 + yM;
  for (let i = 0; i < PHASES.length; i++) {
    const p = PHASES[i];
    if (t >= p.startH * 100 + p.startM && t <= p.endH * 100 + p.endM) return i;
  }
  return 0;
}

    orishaWhoP1:'Ọ̀rọ̀ Ọrísà ní ìtumọ̀ tó péye: ẹni tí Orí yan fún ìdí mímọ́, tàbí ẹni tí ó ti gbega ara rẹ̀ lára àwọn ènìyàn débi tí ó ti kọjá ààlà sínú àgbègbè àwọn ọlọ́run. Àwọn Ọrísà kì í ṣe àwọn ọlọ́run kéékéké. Wọn jẹ́ àwọn ìpilẹ̀ tí ó ń gbé, àwọn agbára àgbáyé tí a fún ní ìpẹ̀lẹ̀ ti ènìyàn. Ọ̀kọ̀ọ̀kan ń ṣàkóso àgbègbè ìwàláàyè — irin, ọgbọ́n, ìwà pẹ̀lẹ̀, òkun, manamana, ìpàdé ọ̀nà — ọ̀kọ̀ọ̀kan sì ń funni ní ìbáṣepọ̀, kì í ṣe ọ̀wọ̀ nìkàn.',
    orishaWhoP2:'Ọ̀sẹ̀ Ọrísà ọjọ́ mẹ́rin kì í ṣe lásán. Ó ṣàpẹẹrẹ ìlà ìṣẹ̀dá fúnrararẹ̀: ìmọ́tótó, ìmọ̀, iṣẹ́, àti ìpadàbọ̀. Ní gbogbo ọjọ́ mẹ́rin, ìyípo náà parí tó sì bẹ̀rẹ̀ lẹ́ẹ̀kansi, fífún olùṣe ní ìlànà àkókò láti gbé ní ìbamu pẹ̀lú òfin àgbáyé.',
    orishaAlertsTitle:'Ìkìlọ̀ Ọjọ́ Ọrísà',
    orishaAlertsDesc:'Gba àwọn ìmọ̀ mímọ́, ìjẹ́rìísí àti ìtọ́sọ́nà ní ojúmọ́ Ọjọ́ Ọrísà kọ̀ọ̀kan, tí a firanṣẹ́ sí àpótí ọ̀rọ̀ rẹ.',

    // Learn tab
    learnAboutLabel:'Nípa Iṣẹ́ Yìí',
    learnHeadline:'Àkókò Kì Í Ṣe Aláìpẹ̀',
    learnTagline:'Gbogbo àgọ́ ń gbé àmì ìmọ́wọ̀ àṣà ti àwọn tó ṣe é.',
    learnP1:'Ayé ń lọ lórí ètò tí a ṣe jìnnà sí ìlà oòrùn, tí a ṣe àtunṣe sí ìlànà tí kò ní ìsopọ̀ àdáyébá pẹ̀lú ìgbésí ayé Afirika. Àárọ̀ owúrọ̀ gẹ́gẹ́ bí ìpilẹ̀ ọjọ́. Ọjọ́ meje tí a jogún láti ọ̀dọ̀ àwọn ọlọ́run pílánẹ́ẹ̀tì Róòmù. Ètò àkókò tí a fi lé lórí, kì í ṣe tí ó dàgbà.',
    learnP2:'Àkókò Ilẹ̀ Yorùbá ń mú àgọ́ padà sí ibiti ó ti yẹ: ojúmọ́. Ní ìtẹ̀lé àṣà àkọsílẹ̀ àkókò Kojoda, ọ̀kan lára àwọn ìlànà tó ti wà títí láí ti ẹ̀dá ènìyàn fún kíka ìbáṣepọ̀ ẹ̀wẹ̀ ọjọ́, òṣùpá, àti ìgbésí ayé ojoojúmọ́, YLT tún ṣe ọjọ́ láti ìbẹ̀rẹ̀ àdáyébá rẹ̀. Nígbà tí akukọ ń kígbe tí ìmọlẹ̀ sì fọ́ ìpàájú, ọjọ́ tuntun wọ̀ wá. Kì í ṣe ṣáájú. Kì í ṣe ní ìkọsẹ̀ owúrọ̀ àáárọ̀ kan nínú òkunkun.',
    learnP3:'Ìṣirò náà jẹ́ àrẹwà. Wákàtí mẹ́rìndínlógún. Ìṣẹ́jú àáyá àádọ́jọ fún ìṣẹ́jú. Ìṣẹ́jú àádọ́ta fún wákàtí. Àpapọ̀? Ìṣẹ́jú àáyá 86,400, dọ́gba pẹ̀lú ọjọ́ àgbáyé. Ohunkóhun kò sọnù. Gbogbo nkan tún ṣe. YLT kì í ṣe àṣàyànmọ̀ fún àkókò ìgbàlódé. Ó jẹ́ àkókò ìgbàlódé, tí a tún ṣe nípasẹ̀ lẹ́ẹ̀ṣẹ tí ó jẹ́ tirẹ̀ àti tirẹ̀ gangan.',
    learnPullQuote:'"Èyí kì í ṣe ìrántí. Ó jẹ́ ìdásílẹ̀. Àkókò tí a sọ ní èdè àwọn baba àti ìyá rẹ. Àkókò tó mọ̀ nígbà tí Ọ̀run bá kan Ayé. Àkókò tó jẹ́ tirẹ."',
    learnRootedIn:'Gbìn Nínú', learnGuidedBy:'Ìtọ́sọ́nà Láti', learnConceivedBy:'Ìpilẹ̀ Látọ̀dọ̀', learnFor:'Fún',

    learnAfonquote:'"Ẹni tó pinnu bí o ṣe wọ̀n àkókò, ló pinnu ìgbésí ayé rẹ, torí pé àkókò ni ìgbésí ayé."',
    learnPrinciple1Title:'Òwúrọ̀ ni ọjọ́', learnPrinciple1Body:'Ọjọ́ bẹ̀rẹ̀ ní ojúmọ́, kì í ṣe ní àárọ̀ owúrọ̀. Àgọ́ rẹ yẹ kí ó bọ̀wọ̀ fún nígbà tí ìgbésí ayé ń bẹ̀rẹ̀ gangan.',
    learnPrinciple2Title:'Ọgbọ́n Wákàtí 16', learnPrinciple2Body:'Wákàtí mẹ́rìndínlógún pẹ̀lú ìṣẹ́jú àáyá àádọ́jọ fún ìṣẹ́jú ń ṣẹ̀dá ètò tó àdáyébá jù. Àwọn wákàtí díẹ̀ tó gùn jù ń dín kù ìjákulẹ̀ ìpín àkókò.',
    learnPrinciple3Title:'Láti Ojúmọ́ dé Ojúmọ́', learnPrinciple3Body:'Ọjọ́ YLT kíkún ń lọ láti ojúmọ́ kan dé ojúmọ́ tó ń bọ̀, tí ó ń bọ̀wọ̀ fún ìyípo àdáyébá tí ara rẹ ti mọ̀ tẹ́lẹ̀.',
    learnPrinciple4Title:'Ìbamu Pípé', learnPrinciple4Body:'Ìṣẹ́jú àáyá 86,400 nínú ẹ̀rọ méjèjì túmọ̀ sí ìyípadà aláìdíwọ̀n. Ohunkóhun kò sọnù, o sì ní ìbamu àṣà.',
    learnPrinciple5Title:'Ìyípo Ọjọ́ Mẹ́rin', learnPrinciple5Body:'Ọ̀sẹ̀ Ọrísà rọ́pò ètò ọjọ́ méje aláìṣòdodo pẹ̀lú ìlànà ọjọ́ mẹ́rin, tí ó ń pèsè ìsọdọ̀tun àti ìmú-padàbọ̀ tó pọ̀ sí i.',
    calNoteTitle:'Àkọsílẹ̀ Kàlẹ́ńdà', calNoteSubtitle:'Ìbéèrè tí a ń dímu pẹ̀lú ìtọ̀dọ̀ọ̀tẹ',
    calNote12Title:'Oṣù 12', calNote12Body:'Iye tí a tọ́ka sí jù, tí a ṣe àpẹẹrẹ ní apá kan nípasẹ̀ ọgọ́rọ̀ọ̀rún ọdún ti ìtẹ̀síwájú láti ṣe ìbamu pẹ̀lú kàlẹ́ńdà Gregori. Bóyá èyí ṣàpẹẹrẹ Yorùbá àtijọ́ tàbí ìbámu àpọ̀nlé jẹ́ ìjiyàn gidi.',
    calNote13Title:'Oṣù 13', calNote13Body:'Àwọn ọ̀mọ̀wé àti àwọn alájọ́ àṣà kan jiyàn fún oṣù mẹ́tàlá, tí wọn ń tọ́ka sí ìyípo òṣùpá àti ìlànà ọjà ìbílẹ̀ tí kò dín kù sí méjìlá.',
    calNote9Title:'Oṣù 9 (Ìṣírò Oyún)', calNote9Body:'Ojú-ìwò tí a kọ̀ sọ̀rọ̀ nípa rẹ̀ kéré sùgbọ́n tó jẹ́ ọlọ́rọ̀ fìlọ́sọ̀fì: ìyípo oyún ènìyàn — oṣù mẹ́sàn-án láti oyún dé ìbí — jẹ́ ìwọ̀n jinlẹ̀ àkókò àgbáyé Yorùbá.',
    calNoteClosing:'YLT kò jẹ̀rìí sí iye ọdún Kojoda kan pàtó. Kò sí aláṣẹ tí ó ń gbé tí ó ti ṣe àgbéjáde àkọsílẹ̀ tó le dúró fúnra rẹ̀ lórí àwọn ìgbàgbọ́ àṣà àti ìkẹ́kọ̀ọ́ tirẹ̀. Títí tí iṣẹ́ yẹn yóò ti parí — nípasẹ̀ àwọn alájọ́ Yorùbá, àwọn òpìtàn, àwọn onímọ̀ ìjìnlẹ̀ ojú ọ̀run, àti àwùjọ pọ̀ — sísọ iye ọdún kankan pàtó yóò jẹ́ ti ìjákulẹ̀. Èyí kì í ṣe yíyágò sẹ́yìn bí kò ṣe ojúṣe tó gbọ̀n: a dímu ìbéèrè náà, a sì fẹ́ kíkópa àṣà àti ìkẹ́kọ̀ọ́ tó dára láti yanjú rẹ̀.',
    calNoteWisdom:'"Ọgbọ́n ẹni tí kò mọ̀ ni í wí pé kò mọ̀." — Ọgbọ́n bẹ̀rẹ̀ ní ìmọ̀ ohun tí o kò tíì mọ̀.',

// Helper — pick translated field from a phase/orisha object
function ph(item, field, lang) {
  const key = lang === 'en' ? field : `${field}_${lang}`;
  return item[key] || item[field];
}

function getOrishaIdx(date, dawnSecs) {
  const epoch = new Date(Date.UTC(2025, 0, 1, 11, 0, 0)); // 2025-01-01 12:00 Lagos = 11:00 UTC
  const lagosMs = date.getTime() + 3600000; // shift to Lagos WAT
  const adj = new Date(lagosMs);
  const nowSecs = lagosTimeSecs(date);
  if (nowSecs < dawnSecs) adj.setTime(adj.getTime() - 86400000); // before dawn = previous YLT day
  // Round to midday of the Lagos day for stable day-counting
  const lagosDay = new Date(Date.UTC(adj.getUTCFullYear(), adj.getUTCMonth(), adj.getUTCDate(), 11, 0, 0));
  return (((Math.floor((lagosDay - epoch) / 86400000) % 4) + 4) % 4);
}

// ─── LUNAR PHASE ENGINE (astronomical) ─────────────────────────────
// Reference new moon: Jan 6 2000 18:14 UTC  (J2000 standard epoch)
// Synodic month: 29.530588853 days (mean value, accurate to seconds/century)
const LUNAR_EPOCH_MS = Date.UTC(2000, 0, 6, 18, 14, 0);
const SYNODIC_MS     = 29.530588853 * 86400000;

// Four Yorùbá cultural phases — layered on top of the astronomical cycle
const YORUBA_PHASES = [
  { name:'Ọṣupa Ìbẹ̀rẹ̀',    en:'New Moon Phase',    desc:'A time for new intentions and quiet beginnings.'         },
  { name:'Ọṣupa Ìdàgbàsókè', en:'Waxing Moon Phase', desc:'Energy grows. Build, expand, and act with momentum.'     },
  { name:'Ọṣupa Kíkún',      en:'Full Moon Phase',   desc:'Peak clarity and power. Celebrate, give thanks, reflect.' },
  { name:'Ọṣupa Ìdínkù',     en:'Waning Moon Phase', desc:'Release what no longer serves. Rest and prepare to renew.' },
];

function getMoonPhase(date, dawnSecs) {
  // Dawn-anchored date makes the cycle location-aware:
  // the moon day turns at each city's local dawn, not at midnight.
  const yDay = yorubaDate(date, dawnSecs);

  // Position within the current synodic cycle  (0.0 = new moon, 0.5 = full moon)
  const msSinceEpoch = yDay.getTime() - LUNAR_EPOCH_MS;
  const cyclePos     = ((msSinceEpoch % SYNODIC_MS) + SYNODIC_MS) % SYNODIC_MS;
  const fracPhase    = cyclePos / SYNODIC_MS;            // 0–1

  // Astronomical illumination (0 % at new, 100 % at full)
  const illumination = Math.round((1 - Math.cos(fracPhase * 2 * Math.PI)) / 2 * 100);

  // Day of the current cycle (1-indexed, out of ~29–30)
  const moonDay = Math.floor(fracPhase * 29.530588853) + 1;

  // 8-phase granularity: icon + English sub-phase name
  const angle = fracPhase * 360;
  let icon, subPhase;
  if      (angle <  22.5) { icon = '🌑'; subPhase = 'New Moon';         }
  else if (angle <  67.5) { icon = '🌒'; subPhase = 'Waxing Crescent';  }
  else if (angle < 112.5) { icon = '🌓'; subPhase = 'First Quarter';    }
  else if (angle < 157.5) { icon = '🌔'; subPhase = 'Waxing Gibbous';   }
  else if (angle < 202.5) { icon = '🌕'; subPhase = 'Full Moon';        }
  else if (angle < 247.5) { icon = '🌖'; subPhase = 'Waning Gibbous';   }
  else if (angle < 292.5) { icon = '🌗'; subPhase = 'Last Quarter';     }
  else if (angle < 337.5) { icon = '🌘'; subPhase = 'Waning Crescent';  }
  else                    { icon = '🌑'; subPhase = 'New Moon';          }

  // Map fractional phase to one of the four Yorùbá cultural seasons
  const yIdx  = fracPhase < 0.25 ? 0 : fracPhase < 0.5 ? 1 : fracPhase < 0.75 ? 2 : 3;
  const phase = { ...YORUBA_PHASES[yIdx], icon, subPhase };

  return { moonDay, phase, illumination, fracPhase };
}

// ─── YORÙBÁ CALENDAR DATE ──────────────────────────────────────────
// The Yorùbá day begins at dawn, not at Gregorian midnight.
// If the current Lagos time is before dawn, we are still in yesterday's Yorùbá day.
// Returns a Date whose UTC fields hold the correct Yorùbá calendar date (noon UTC,
// so it is safe to format with timeZone:'UTC' without risk of date shifting).
function yorubaDate(date, dawnSecs) {
  const lagosNow = new Date(date.getTime() + 3600000); // Lagos WAT = UTC+1
  if (lagosTimeSecs(date) < dawnSecs) {
    lagosNow.setTime(lagosNow.getTime() - 86400000);   // before dawn → previous Yorùbá day
  }
  return new Date(Date.UTC(
    lagosNow.getUTCFullYear(), lagosNow.getUTCMonth(), lagosNow.getUTCDate(), 12, 0, 0
  ));
}

// ─── 16-HOUR DAY SCALE ─────────────────────────────────────────────
// A ruler spanning the full YLT day (01:00 → 16:59).
// Replaces the simple progress bar with a richly annotated timeline:
//   • Phase colour strips show all 8 phases in proportion
//   • Tick marks every YLT hour (major every 4 hours)
//   • Cock crow markers (small gold triangles)
//   • OJÓ / ALẸ́ midpoint divider at hour 9 (the 50% mark)
//   • A live cursor bubble displaying the full 16-hour YLT time
function DayScale({ yH, yM, phase, isDark }) {
  const W = 320, TOTAL_MIN = 960; // 16 hrs × 60 YLT min
  const toX = (h, m) => ((h - 1) * 60 + m) / TOTAL_MIN * W;
  const curX = toX(yH, yM);
  const progress = Math.round(((yH - 1) * 60 + yM) / TOTAL_MIN * 100);

  // Phase bands [start_min, end_min, fill]
  // Minute positions = (yH-1)*60 + yM, range 0–959
  const bands = [
    [0,   39,  '#D97706'], // Ojúmọ́       1:00–1:39
    [40,  219, '#F59E0B'], // Òwúrọ̀      1:40–4:39
    [220, 259, '#EF4444'], // Ìyálẹ̀ta    4:40–5:19
    [260, 439, '#F97316'], // Òsán        5:20–8:19
    [440, 519, '#8B5CF6'], // Ìròlẹ́     8:20–9:39
    [520, 719, '#6366F1'], // Alẹ́        9:40–12:59
    [720, 919, '#1E3A5F'], // Òru        13:00–16:19
    [920, 959, '#7C3AED'], // Àfẹ̀mọ́jumọ́ 16:20–16:59
  ];

  // Cock crow minute positions: yH 1/13/14.33/15.67 → min 0/720/800/880
  const crowMins = [0, 720, 800, 880];

  // Clamp label box so it never bleeds off edges
  const LW = 38, LH = 13;
  const labelX = Math.max(0, Math.min(W - LW, curX - LW / 2));

  return (
    <div style={{ width: '100%' }}>
      {/* viewBox top = -20 to give room for the cursor label bubble above the strip */}
      <svg viewBox="0 -20 320 62" style={{ width: '100%', height: 'auto', display: 'block', overflow: 'visible' }}>

        {/* ── Phase colour strip ── */}
        {bands.map(([s, e, c], i) => {
          const bx = s / TOTAL_MIN * W;
          const bw = Math.max(2, (e - s + 1) / TOTAL_MIN * W);
          return (
            <rect key={i} x={bx} y={0} width={bw} height={8} fill={c} opacity={0.76}
              rx={i === 0 ? 2 : i === 7 ? 2 : 0} />
          );
        })}

        {/* ── Ruler baseline ── */}
        <line x1={0} y1={9} x2={W} y2={9} stroke={isDark ? "rgba(196,169,106,0.22)" : "rgba(61,43,31,0.18)"} strokeWidth={1} />

        {/* ── OJÓ / ALẸ́ divider at the exact 50% mark (hour 9 boundary) ── */}
        <line x1={W / 2} y1={0} x2={W / 2} y2={38}
          stroke={isDark ? "#A89070" : "#3D2B1F"} strokeWidth={1} strokeDasharray="3,2" opacity={0.28} />

        {/* ── Hour tick marks — major every 4 hours, minor every 1 ── */}
        {Array.from({ length: 17 }, (_, i) => {
          const x = i / 16 * W;
          const major = i % 4 === 0;
          return (
            <line key={i} x1={x} y1={9} x2={x} y2={major ? 21 : 15}
              stroke={isDark ? "rgba(196,169,106,0.45)" : "rgba(61,43,31,0.38)"} strokeWidth={major ? 1.3 : 0.65} />
          );
        })}

        {/* ── Cock crow gold triangles ── */}
        {crowMins.map((min, i) => {
          const x = min / TOTAL_MIN * W;
          return (
            <polygon key={i} points={`${x},10 ${x - 2.5},16 ${x + 2.5},16`}
              fill="rgba(245,158,11,0.58)" />
          );
        })}

        {/* ── Hour labels: 01  05  09  13  16 ── */}
        {[1, 5, 9, 13].map(h => (
          <text key={h} x={h === 1 ? 0 : (h - 1) / 16 * W} y={29}
            fontSize={7.5} fill={isDark ? "#A89070" : "#8B7355"} fontFamily="DM Sans,sans-serif"
            textAnchor={h === 1 ? 'start' : 'middle'} opacity={0.88}>
            {String(h).padStart(2, '0')}
          </text>
        ))}
        <text x={W} y={29} fontSize={7.5} fill={isDark ? "#A89070" : "#8B7355"}
          fontFamily="DM Sans,sans-serif" textAnchor="end" opacity={0.88}>16</text>

        {/* ── Cycle labels ── */}
        <text x={W * 0.25} y={42} fontSize={7.5} fill="#D97706"
          fontFamily="DM Sans,sans-serif" textAnchor="middle"
          fontWeight={700} letterSpacing="1.2">OJÓ</text>
        <text x={W * 0.75} y={42} fontSize={7.5} fill={isDark ? "#A5B4FC" : "#6366F1"}
          fontFamily="DM Sans,sans-serif" textAnchor="middle"
          fontWeight={700} letterSpacing="1.2">ALẸ́</text>

        {/* ── Live cursor ── */}
        <line x1={curX} y1={-20} x2={curX} y2={38}
          stroke={phase.color} strokeWidth={1.5} opacity={0.82} />
        {/* Glow halo in the phase strip */}
        <circle cx={curX} cy={4} r={6} fill={phase.color} opacity={0.14} />
        <circle cx={curX} cy={4} r={3.5} fill={phase.color} />
        <circle cx={curX} cy={4} r={1.6} fill="white" opacity={0.85} />

        {/* ── Label bubble: full 16-hour YLT time ── */}
        <rect x={labelX} y={-19} width={LW} height={LH} rx={3}
          fill={phase.color} opacity={0.93} />
        <text x={labelX + LW / 2} y={-8.5} fontSize={8} fill="white"
          fontFamily="Cormorant Garamond,serif" fontWeight={700} textAnchor="middle">
          {fmt2(yH)}:{fmt2(yM)}
        </text>
      </svg>

      {/* Footer row: dawn label · progress · pre-dawn label */}
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '9px', color: '#A89070', marginTop: '2px' }}>
        <span>🌅 01:00 Dawn</span>
        <span style={{ color: phase.color, fontWeight: 700 }}>{progress}% of day complete</span>
        <span>16:59 Pre-dawn 🌠</span>
      </div>
    </div>
  );
}

// ─── ANALOG CLOCK — PREMIUM 16-HOUR FACE ──────────────────────────
// Luxury haute horology aesthetic: multi-layer bezel, sunburst dial,
// guilloché-inspired chapter ring, applied gold indices, dauphine hands.
// OJÓ (hrs 1-8) and ALẸ́ (hrs 9-16) rendered as distinct track arcs.
function AnalogClock({ yH, yM, yS, color, moonFrac = 0 }) {
  const sz = 320, cx = 160, cy = 160;

  // Radii — layered outward-in like a real watch movement
  const rCaseEdge  = 156;  // outermost case edge
  const rBezel1    = 152;  // outer bezel ring (polished gold)
  const rBezel2    = 143;  // bezel step / flange
  const rChapter   = 138;  // chapter ring outer edge
  const rDial      = 124;  // main dial face
  const rTrack     = 115;  // OJÓ/ALẸ́ coloured track
  const rNumerals  = 104;  // where hour numerals sit
  const rInnerRing =  72;  // inner decorative ring

  const hourLabelDeg = (h)               => (h / 16) * 360 - 90;
  const hourHandDeg  = (h, m = 0, s = 0) => ((h + m / 60 + s / 3600) / 16) * 360 - 90;
  const toRad = d => d * Math.PI / 180;
  const pt = (rr, deg) => ({ x: cx + rr * Math.cos(toRad(deg)), y: cy + rr * Math.sin(toRad(deg)) });

  const arcPath = (rr, a1, a2) => {
    const p1 = pt(rr, a1), p2 = pt(rr, a2);
    const large = (a2 - a1 + 360) % 360 > 180 ? 1 : 0;
    return `M ${p1.x} ${p1.y} A ${rr} ${rr} 0 ${large} 1 ${p2.x} ${p2.y}`;
  };

  const ojoEnd   = hourLabelDeg(8);   //  90°
  const aleEnd   = hourLabelDeg(16);  // 270° = top

  // ── Chapter ring tick marks ──
  // 64 minor positions + 16 major (applied-index style)
  const ticks = [];
  for (let i = 0; i < 64; i++) {
    const deg    = ((i + 1) / 64) * 360 - 90;
    const isMaj  = i % 4 === 3; // falls on every 4th = hour position
    const isQtr  = (i + 1) % 16 === 0; // quarter hours: 4,8,12,16
    const outer  = rChapter - 1;
    const inner  = isQtr ? rChapter - 13 : isMaj ? rChapter - 9 : rChapter - 5;
    const sw     = isQtr ? 2.2 : isMaj ? 1.4 : 0.7;
    const isNight = deg > 90 && deg <= 270;
    const col    = isQtr ? '#C4A96A' : isMaj ? (isNight ? '#9EA3F8' : '#A8893C') : 'rgba(168,137,60,0.4)';
    const p1 = pt(outer, deg), p2 = pt(inner, deg);
    ticks.push(
      <line key={`tk${i}`} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y}
        stroke={col} strokeWidth={sw} strokeLinecap="square" />
    );
  }

  // ── Applied gold hour indices (dauphine-style rectangles) ──
  const indices = [];
  for (let i = 1; i <= 16; i++) {
    const deg    = hourLabelDeg(i);
    const rad    = toRad(deg);
    const isQtr  = i % 4 === 0;
    const isOjo  = i <= 8;
    // Rectangle index — tall for quarters, shorter for others
    const iw = isQtr ? 5 : 3.5;
    const ih = isQtr ? 14 : 10;
    const ir = rChapter - 16;  // centre of index
    const ix = cx + ir * Math.cos(rad);
    const iy = cy + ir * Math.sin(rad);
    const rotDeg = deg + 90; // rotate to point radially
    const fill   = isQtr ? 'url(#goldIndex)' : isOjo ? 'url(#goldIndexSm)' : 'url(#indigoIndex)';
    indices.push(
      <rect key={`idx${i}`}
        x={ix - iw / 2} y={iy - ih / 2}
        width={iw} height={ih}
        fill={fill}
        transform={`rotate(${rotDeg} ${ix} ${iy})`}
        rx="0.8"
      />
    );
  }

  // ── Hour numerals (Cormorant, inside inner ring) ──
  const numerals = [];
  const yorubaH = YLT_H_NAMES;

  // ── YLT inscriptions — discreet arc-engraving in the gap between numerals ──
  // Top gap (16 & 1, mid=281.25°): YLTM — individual letters, tangent-rotated
  // Bottom gap (8 & 9, mid=101.25°): AGOGO — same technique, +180° so it reads right-side up
  const rYLT   = 116;
  const yltInsriptions = (() => {
    const mkLetters = (word, mid, flip) => {
      const letters = flip ? word.split('').reverse() : word.split('');
      const n = letters.length;
      const step = 3.0;  // same as YLTM original offsets
      const half = (n - 1) / 2;
      return letters.map((letter, li) => {
        const deg    = mid + (li - half) * step;
        const p      = pt(rYLT, deg);
        const rotDeg = deg + 90 + (flip ? 180 : 0);
        return (
          <text key={`ins-${mid}-${li}`}
            x={p.x} y={p.y}
            textAnchor="middle" dominantBaseline="central"
            fill="#C4A96A" fontSize="7" fontWeight="600"
            fontFamily="'Cormorant Garamond', serif"
            opacity="0.85"
            transform={`rotate(${rotDeg} ${p.x} ${p.y})`}
          >{letter}</text>
        );
      });
    };
    return [
      ...mkLetters('YLTM',  281.25, false),
      ...mkLetters('AGOGO', 101.25, true),
    ];
  })();

  for (let i = 1; i <= 16; i++) {
    const deg   = hourLabelDeg(i);
    const p     = pt(rNumerals, deg);
    const isQtr = i % 4 === 0;
    const isOjo = i <= 8;
    const fSize = isQtr ? 13.5 : (i >= 10 ? 10 : 11);
    const col   = isQtr ? (isOjo ? '#6B4C28' : '#4338CA') : (isOjo ? '#8B6F47' : '#6366F1');
    numerals.push(
      <text key={`nm${i}`} x={p.x} y={p.y}
        textAnchor="middle" dominantBaseline="central"
        fill={col} fontSize={fSize} fontWeight={isQtr ? '700' : '500'}
        fontFamily="'Cormorant Garamond', serif"
        opacity={isQtr ? 1 : 0.88}
      >{i}</text>
    );
  }

  // ── Cock crow markers — elegant diamond shape on chapter ring ──
  const crowMarkers = COCK_CROWS.map((c, i) => {
    const deg = hourLabelDeg(c.yH) + (c.yM / 60) * (360 / 16);
    const p   = pt(rBezel2 - 5, deg);
    const s   = 4;
    const rad = toRad(deg);
    return (
      <polygon key={`cw${i}`}
        points={`${p.x},${p.y - s} ${p.x + s * 0.55},${p.y} ${p.x},${p.y + s} ${p.x - s * 0.55},${p.y}`}
        fill="white" opacity="0.92"
        transform={`rotate(${deg + 90} ${p.x} ${p.y})`}
      />
    );
  });

  // ── Dauphine-style hands ──
  // Each hand is a filled polygon: wide at base, tapers to a point
  const dauphinePath = (deg, tipR, baseHW, tailR = 18, tailHW = 2) => {
    const rad = toRad(deg);
    const perp = toRad(deg + 90);
    const tipX  = cx + tipR  * Math.cos(rad),  tipY  = cy + tipR  * Math.sin(rad);
    const tailX = cx - tailR * Math.cos(rad),  tailY = cy - tailR * Math.sin(rad);
    // Mid-bevel point — widest part a third up from pivot
    const midR = tailR * 0.6;
    const midX = cx - midR * Math.cos(rad), midY = cy - midR * Math.sin(rad);
    // Build polygon: tip → left shoulder → tail-left → tail-right → right shoulder
    const lx1 = midX  + baseHW * Math.cos(perp),  ly1 = midY  + baseHW * Math.sin(perp);
    const lx2 = tailX + tailHW * Math.cos(perp),  ly2 = tailY + tailHW * Math.sin(perp);
    const rx1 = midX  - baseHW * Math.cos(perp),  ry1 = midY  - baseHW * Math.sin(perp);
    const rx2 = tailX - tailHW * Math.cos(perp),  ry2 = tailY - tailHW * Math.sin(perp);
    return `M ${tipX} ${tipY} L ${lx1} ${ly1} L ${lx2} ${ly2} L ${rx2} ${ry2} L ${rx1} ${ry1} Z`;
  };

  const hDeg = hourHandDeg(yH, yM, yS);
  const mDeg = ((yM + yS / 90) / 60) * 360 - 90;
  const sDeg = (yS / 90)               * 360 - 90;

  // Lume plot positions (small dots near tip of hour & minute hand)
  const lumeDot = (deg, r2) => {
    const p = pt(r2, deg);
    return <circle cx={p.x} cy={p.y} r={2.2} fill="rgba(240,235,200,0.75)" />;
  };

  return (
    <svg width={sz} height={sz} viewBox={`0 0 ${sz} ${sz}`}
      style={{ filter:'drop-shadow(0 8px 32px rgba(40,28,14,0.38)) drop-shadow(0 2px 6px rgba(40,28,14,0.22))', maxWidth:'100%', overflow:'visible', display:'block' }}>
      <defs>
        {/* Sunburst dial — warm ivory radial */}
        <radialGradient id="dialFace" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stopColor="#FEFAF3" />
          <stop offset="45%"  stopColor="#F8F0E0" />
          <stop offset="80%"  stopColor="#F0E4CC" />
          <stop offset="100%" stopColor="#E6D5B4" />
        </radialGradient>
        {/* Sunburst rays (subtle linear stripes via pattern) */}
        <radialGradient id="sunburst" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
          <stop offset="0%"   stopColor="#FFF8E8" stopOpacity="0.9" />
          <stop offset="60%"  stopColor="#F5EAD0" stopOpacity="0.5" />
          <stop offset="100%" stopColor="#E8D5B0" stopOpacity="0" />
        </radialGradient>
        {/* Multi-layer bezel gradient */}
        <linearGradient id="bezelGold" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stopColor="#E8CC78" />
          <stop offset="20%"  stopColor="#C4A96A" />
          <stop offset="45%"  stopColor="#F0D890" />
          <stop offset="60%"  stopColor="#A8893C" />
          <stop offset="80%"  stopColor="#D4B668" />
          <stop offset="100%" stopColor="#8B7030" />
        </linearGradient>
        {/* Inner bezel step */}
        <linearGradient id="bezelStep" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stopColor="#D4B45A" />
          <stop offset="50%"  stopColor="#9A7828" />
          <stop offset="100%" stopColor="#C4A030" />
        </linearGradient>
        {/* Chapter ring — dark polished */}
        <linearGradient id="chapterRing" x1="15%" y1="0%" x2="85%" y2="100%">
          <stop offset="0%"   stopColor="#2A1E0E" />
          <stop offset="30%"  stopColor="#3D2B18" />
          <stop offset="60%"  stopColor="#1E1408" />
          <stop offset="100%" stopColor="#2E2010" />
        </linearGradient>
        {/* Applied gold index — tall quarter */}
        <linearGradient id="goldIndex" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stopColor="#E8CC78" />
          <stop offset="40%"  stopColor="#F8E898" />
          <stop offset="100%" stopColor="#B89240" />
        </linearGradient>
        {/* Applied gold index — smaller hour */}
        <linearGradient id="goldIndexSm" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stopColor="#C4A054" />
          <stop offset="50%"  stopColor="#DCC070" />
          <stop offset="100%" stopColor="#A88030" />
        </linearGradient>
        {/* Applied indigo index — night hours */}
        <linearGradient id="indigoIndex" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stopColor="#6366F1" />
          <stop offset="50%"  stopColor="#818CF8" />
          <stop offset="100%" stopColor="#4338CA" />
        </linearGradient>
        {/* Dauphine hour hand */}
        <linearGradient id="handHour" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stopColor="#2A1E0E" />
          <stop offset="35%"  stopColor="#5C4028" />
          <stop offset="60%"  stopColor="#3D2818" />
          <stop offset="100%" stopColor="#1E1008" />
        </linearGradient>
        {/* Dauphine minute hand */}
        <linearGradient id="handMin" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stopColor="#3D2C18" />
          <stop offset="40%"  stopColor="#6B4C30" />
          <stop offset="100%" stopColor="#2A1E0E" />
        </linearGradient>
        {/* Centre cap — layered gold */}
        <radialGradient id="capGold" cx="38%" cy="30%">
          <stop offset="0%"   stopColor="#F0DC90" />
          <stop offset="50%"  stopColor="#C4A030" />
          <stop offset="100%" stopColor="#8B7028" />
        </radialGradient>
        {/* OJÓ track */}
        <linearGradient id="ojoTrack" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stopColor="#F59E0B" stopOpacity="0.55" />
          <stop offset="100%" stopColor="#D97706" stopOpacity="0.25" />
        </linearGradient>
        {/* ALẸ́ track */}
        <linearGradient id="aleTrack" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%"   stopColor="#818CF8" stopOpacity="0.55" />
          <stop offset="100%" stopColor="#4338CA" stopOpacity="0.25" />
        </linearGradient>
        {/* Night half tint */}
        <radialGradient id="nightTint" cx="50%" cy="75%" r="60%">
          <stop offset="0%"   stopColor="#1E1B4B" stopOpacity="0.18" />
          <stop offset="100%" stopColor="#1E1B4B" stopOpacity="0.00" />
        </radialGradient>
        {/* Inner decorative ring */}
        <linearGradient id="innerRing" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stopColor="rgba(196,160,48,0.6)" />
          <stop offset="50%"  stopColor="rgba(196,160,48,0.15)" />
          <stop offset="100%" stopColor="rgba(196,160,48,0.5)" />
        </linearGradient>
        {/* Shadow filter for hands */}
        <filter id="handShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="1" dy="2" stdDeviation="2" floodColor="rgba(0,0,0,0.5)" />
        </filter>
        <filter id="caseShadow" x="-5%" y="-5%" width="110%" height="110%">
          <feDropShadow dx="0" dy="3" stdDeviation="5" floodColor="rgba(30,16,4,0.55)" />
        </filter>
        {/* Lunar glow filter — brightens near full moon */}
        <filter id="moonGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        {/* Moon disc dark side */}
        <radialGradient id="moonDark" cx="50%" cy="40%" r="60%">
          <stop offset="0%"   stopColor="#2A2040" />
          <stop offset="100%" stopColor="#0E0818" />
        </radialGradient>
        {/* Moon disc lit side */}
        <radialGradient id="moonLit" cx="38%" cy="32%" r="65%">
          <stop offset="0%"   stopColor="#FEFAE8" />
          <stop offset="55%"  stopColor="#ECD88A" />
          <stop offset="100%" stopColor="#C8A840" />
        </radialGradient>
      </defs>

      {/* ── LUNAR PHASE BEZEL GLOW ── */}
      {/* A halo around the case that brightens at full moon, vanishes at new moon */}
      {(() => {
        const illum = (1 - Math.cos(moonFrac * 2 * Math.PI)) / 2; // 0=new, 1=full
        const isWaxing = moonFrac < 0.5;
        const glowColor = moonFrac > 0.45 && moonFrac < 0.55
          ? `rgba(255,245,200,${(illum * 0.55).toFixed(3)})`   // full: warm gold-white
          : isWaxing
          ? `rgba(200,215,255,${(illum * 0.32).toFixed(3)})`   // waxing: cool blue-silver
          : `rgba(220,200,160,${(illum * 0.28).toFixed(3)})`; // waning: warm amber
        return illum > 0.04 ? (
          <circle cx={cx} cy={cy} r={rCaseEdge + 6}
            fill="none"
            stroke={glowColor}
            strokeWidth={illum > 0.85 ? 10 : 6}
            filter="url(#moonGlow)"
            opacity={illum}
          />
        ) : null;
      })()}

      {/* ── CASE & BEZEL LAYERS ── */}
      {/* Outermost case shadow */}
      <circle cx={cx} cy={cy} r={rCaseEdge} fill="url(#bezelGold)" filter="url(#caseShadow)" />
      {/* Outer bezel polished surface */}
      <circle cx={cx} cy={cy} r={rBezel1}   fill="url(#bezelGold)" />
      {/* Bezel step — darker inner band */}
      <circle cx={cx} cy={cy} r={rBezel2}   fill="url(#bezelStep)" />

      {/* Cock crow markers on bezel */}
      {crowMarkers}

      {/* ── CHAPTER RING ── */}
      <circle cx={cx} cy={cy} r={rChapter}  fill="url(#chapterRing)" />
      {/* Chapter ring inner edge highlight */}
      <circle cx={cx} cy={cy} r={rChapter - 0.5} fill="none" stroke="rgba(196,169,106,0.4)" strokeWidth="0.8" />

      {/* Tick marks on chapter ring */}
      {ticks}

      {/* ── DIAL FACE ── */}
      <circle cx={cx} cy={cy} r={rDial}     fill="url(#dialFace)" />
      {/* Sunburst overlay — subtle rays */}
      <circle cx={cx} cy={cy} r={rDial}     fill="url(#sunburst)" />

      {/* Night-half cool tint */}
      <path
        d={`M ${cx} ${cy} L ${pt(rDial, 90).x} ${pt(rDial, 90).y} A ${rDial} ${rDial} 0 1 1 ${pt(rDial, 270).x} ${pt(rDial, 270).y} Z`}
        fill="url(#nightTint)"
      />

      {/* ── OJÓ / ALẸ́ COLOURED TRACK ── */}
      {/* OJÓ track — gold, hours 1-8 */}
      <path d={arcPath(rTrack, hourLabelDeg(1), ojoEnd)}
        fill="none" stroke="url(#ojoTrack)" strokeWidth="7" strokeLinecap="butt" />
      {/* Track highlight shimmer */}
      <path d={arcPath(rTrack + 1, hourLabelDeg(1), ojoEnd)}
        fill="none" stroke="rgba(255,220,120,0.25)" strokeWidth="2" strokeLinecap="butt" />

      {/* ALẸ́ track — indigo, hours 9-16 */}
      <path d={arcPath(rTrack, hourLabelDeg(9), aleEnd)}
        fill="none" stroke="url(#aleTrack)" strokeWidth="7" strokeLinecap="butt" />
      <path d={arcPath(rTrack + 1, hourLabelDeg(9), aleEnd)}
        fill="none" stroke="rgba(180,185,255,0.22)" strokeWidth="2" strokeLinecap="butt" />

      {/* ── INNER DECORATIVE RING ── */}
      <circle cx={cx} cy={cy} r={rInnerRing}
        fill="none" stroke="url(#innerRing)" strokeWidth="1" />
      <circle cx={cx} cy={cy} r={rInnerRing - 3}
        fill="none" stroke="rgba(196,160,48,0.12)" strokeWidth="0.5" />

      {/* ── APPLIED INDICES ── */}
      {indices}

      {/* ── NUMERALS ── */}
      {numerals}

      {/* ── YLT — inscribed between 16 & 1, and between 8 & 9 ── */}
      {yltInsriptions}

      {/* OJÓ / ALẸ́ labels removed from dial — retained in card below clock */}

      {/* ── LUNAR PHASE SUBDIAL — premium complication ── */}
      {/* Positioned at 6 o'clock inner zone (cy+46). Shows live astronomical phase. */}
      {(() => {
        const mx = cx, my = cy + 46, r = 15;
        const illum = (1 - Math.cos(moonFrac * 2 * Math.PI)) / 2; // 0=new→1=full
        const isWaxing = moonFrac < 0.5;
        const isNew    = moonFrac < 0.03 || moonFrac > 0.97;
        const isFull   = moonFrac > 0.47 && moonFrac < 0.53;
        const termX    = Math.cos(moonFrac * 2 * Math.PI) * r;
        const ex       = Math.abs(termX);
        // Phase name
        const phaseName = isNew ? '🌑' : isFull ? '🌕'
          : moonFrac < 0.25 ? '🌒' : moonFrac < 0.5 ? '🌓'
          : moonFrac < 0.75 ? '🌔' : '🌗';
        const uid = 'lp2';
        return (
          <g>
            {/* Outer ring glow — brightens at full moon */}
            {illum > 0.6 && (
              <circle cx={mx} cy={my} r={r + 5}
                fill="none"
                stroke={`rgba(255,245,180,${(illum * 0.35).toFixed(2)})`}
                strokeWidth="3" />
            )}
            {/* Subdial bezel — polished dark pocket */}
            <circle cx={mx} cy={my} r={r + 3.5}
              fill="#0A0814"
              stroke="rgba(196,160,48,0.45)" strokeWidth="1.2" />
            <circle cx={mx} cy={my} r={r + 2.5}
              fill="none"
              stroke="rgba(100,90,180,0.3)" strokeWidth="0.6" />

            {/* Dark (unlit) disc */}
            <circle cx={mx} cy={my} r={r} fill="url(#moonDark)" />

            {/* Lit portion */}
            <clipPath id={`${uid}-clip`}>
              <circle cx={mx} cy={my} r={r} />
            </clipPath>
            <g clipPath={`url(#${uid}-clip)`}>
              {isNew
                ? null
                : isFull
                ? <circle cx={mx} cy={my} r={r} fill="url(#moonLit)" />
                : (() => {
                    const litHalf = isWaxing
                      ? `M ${mx} ${my-r} A ${r} ${r} 0 0 1 ${mx} ${my+r} Z`
                      : `M ${mx} ${my-r} A ${r} ${r} 0 0 0 ${mx} ${my+r} Z`;
                    const tSweep = isWaxing
                      ? (moonFrac < 0.25 ? 1 : 0)
                      : (moonFrac < 0.75 ? 1 : 0);
                    const termPath = `M ${mx} ${my-r} A ${ex} ${r} 0 0 ${tSweep} ${mx} ${my+r} Z`;
                    const termFill = isWaxing
                      ? (moonFrac < 0.25 ? '#0A0814' : 'url(#moonLit)')
                      : (moonFrac < 0.75 ? 'url(#moonLit)' : '#0A0814)');
                    return (
                      <>
                        <path d={litHalf} fill="url(#moonLit)" />
                        {ex > 0.8 && <path d={termPath} fill={termFill} />}
                      </>
                    );
                  })()
              }
            </g>

            {/* Terminator atmosphere glow */}
            {!isNew && !isFull && ex > 1 && (
              <ellipse cx={mx + termX * 0.5} cy={my}
                rx={Math.max(0.5, ex * 0.3)} ry={r}
                fill="none" stroke="rgba(220,240,255,0.18)" strokeWidth="1"
                clipPath={`url(#${uid}-clip)`} />
            )}

            {/* Rim highlight — polished bezel reflection */}
            <circle cx={mx} cy={my} r={r}
              fill="none"
              stroke="rgba(255,252,240,0.12)" strokeWidth="0.7" />

            {/* phase % label removed */}
          </g>
        );
      })()}

      {/* ── CENTRE — rooster emblem only, no YLT text ── */}
      {/*
        Bold geometric rooster — inspired by reference image:
        facing right, large round body, bold tail plumes sweeping left,
        triple-peak comb, shaft hole sits in centre of body.
        All coordinates relative to cx=160, cy=160.
        Bird occupies roughly y: 108→154, x: 130→185
      */}
      <g opacity="0.92">
        {/* ── TAIL PLUMES — sweeping arcs to the left, behind body ── */}
        {/* 5 bold curved feathers, fanning upward */}
        <path d={`M ${cx-8} ${cy-14} C ${cx-22} ${cy-22} ${cx-32} ${cy-30} ${cx-28} ${cy-42}`}
          stroke="#B8942A" strokeWidth="3.2" fill="none" strokeLinecap="round"/>
        <path d={`M ${cx-8} ${cy-11} C ${cx-24} ${cy-16} ${cx-36} ${cy-20} ${cx-34} ${cy-34}`}
          stroke="#C4A96A" strokeWidth="2.8" fill="none" strokeLinecap="round"/>
        <path d={`M ${cx-8} ${cy-8}  C ${cx-24} ${cy-10} ${cx-36} ${cy-10} ${cx-36} ${cy-22}`}
          stroke="#A8883A" strokeWidth="2.4" fill="none" strokeLinecap="round"/>
        <path d={`M ${cx-8} ${cy-5}  C ${cx-22} ${cy-4}  ${cx-34} ${cy}    ${cx-34} ${cy-10}`}
          stroke="#C4A96A" strokeWidth="2.0" fill="none" strokeLinecap="round"/>
        <path d={`M ${cx-8} ${cy-2}  C ${cx-20} ${cy+2}  ${cx-30} ${cy+4}  ${cx-30} ${cy-4}`}
          stroke="#B8942A" strokeWidth="1.6" fill="none" strokeLinecap="round"/>

        {/* ── BODY — large, bold, round ── */}
        <ellipse cx={cx+2} cy={cy-8} rx="18" ry="15" fill="#C4A96A"/>
        {/* Wing overlay — slightly darker ellipse */}
        <ellipse cx={cx+3} cy={cy-10} rx="13" ry="9" fill="#B8942A" opacity="0.55"/>
        {/* Wing feather detail lines */}
        <path d={`M ${cx-7} ${cy-15} Q ${cx+3} ${cy-18} ${cx+14} ${cy-13}`}
          stroke="#8B6B2A" strokeWidth="0.9" fill="none" opacity="0.7"/>
        <path d={`M ${cx-7} ${cy-11} Q ${cx+3} ${cy-14} ${cx+14} ${cy-9}`}
          stroke="#8B6B2A" strokeWidth="0.9" fill="none" opacity="0.5"/>

        {/* ── NECK — connecting body to head ── */}
        <path d={`M ${cx-6} ${cy-21} Q ${cx-5} ${cy-27} ${cx} ${cy-30} Q ${cx+5} ${cy-27} ${cx+6} ${cy-21} Q ${cx+2} ${cy-19} ${cx-2} ${cy-19} Z`}
          fill="#C4A96A"/>

        {/* ── HEAD — bold circle ── */}
        <circle cx={cx} cy={cy-38} r="10" fill="#C4A96A"/>

        {/* ── COMB — three bold triangular peaks, crimson ── */}
        <polygon points={`${cx-5},${cy-47} ${cx-3},${cy-54} ${cx-1},${cy-47}`} fill="#C0392B"/>
        <polygon points={`${cx-2},${cy-48} ${cx},${cy-56}   ${cx+2},${cy-48}`} fill="#C0392B"/>
        <polygon points={`${cx+1},${cy-47} ${cx+4},${cy-53} ${cx+6},${cy-47}`} fill="#C0392B"/>

        {/* ── WATTLE — small teardrop ── */}
        <ellipse cx={cx+6} cy={cy-33} rx="3" ry="4" fill="#C0392B" opacity="0.85"/>

        {/* ── BEAK — bold pointed triangle, facing right ── */}
        <polygon points={`${cx+8},${cy-39} ${cx+17},${cy-37} ${cx+8},${cy-35}`} fill="#8B5A1A"/>

        {/* ── EYE — dark with gold iris ring ── */}
        <circle cx={cx+3} cy={cy-40} r="3.2" fill="#1A0D05"/>
        <circle cx={cx+3} cy={cy-40} r="1.8" fill="#D4B060"/>
        <circle cx={cx+3} cy={cy-40} r="0.9" fill="#1A0D05"/>
        <circle cx={cx+4} cy={cy-41} r="0.5" fill="rgba(255,255,255,0.65)"/>

        {/* ── LEGS — sturdy, splayed ── */}
        <line x1={cx-4}  y1={cy+7}  x2={cx-7}  y2={cy+18} stroke="#7A5020" strokeWidth="2.8" strokeLinecap="round"/>
        <line x1={cx+8}  y1={cy+7}  x2={cx+11} y2={cy+18} stroke="#7A5020" strokeWidth="2.8" strokeLinecap="round"/>

        {/* ── FEET — three toes each ── */}
        <path d={`M ${cx-7} ${cy+18} L ${cx-13} ${cy+21} M ${cx-7} ${cy+18} L ${cx-6} ${cy+22} M ${cx-7} ${cy+18} L ${cx-2} ${cy+20}`}
          stroke="#7A5020" strokeWidth="2.2" strokeLinecap="round" fill="none"/>
        <path d={`M ${cx+11} ${cy+18} L ${cx+5}  ${cy+21} M ${cx+11} ${cy+18} L ${cx+12} ${cy+22} M ${cx+11} ${cy+18} L ${cx+16} ${cy+20}`}
          stroke="#7A5020" strokeWidth="2.2" strokeLinecap="round" fill="none"/>
      </g>

      {/* YLT text removed from centre — placed between hour numerals instead */}

      {/* ── HANDS ── */}
      {/* Hour hand — broad dauphine, deep brown */}
      <path d={dauphinePath(hDeg, rDial * 0.52, 5.5, 20, 2.5)}
        fill="url(#handHour)" filter="url(#handShadow)" />
      {/* Hour hand bevel highlight */}
      <path d={dauphinePath(hDeg, rDial * 0.52, 2, 20, 1)}
        fill="rgba(120,90,50,0.55)" />

      {/* Minute hand — slender dauphine */}
      <path d={dauphinePath(mDeg, rDial * 0.74, 3.8, 16, 1.8)}
        fill="url(#handMin)" filter="url(#handShadow)" />
      <path d={dauphinePath(mDeg, rDial * 0.74, 1.4, 16, 0.8)}
        fill="rgba(140,110,70,0.5)" />

      {/* Lume plots */}
      {lumeDot(hDeg, rDial * 0.42)}
      {lumeDot(mDeg, rDial * 0.65)}

      {/* Second hand — ultra-thin, phase colour, with counterbalance tail */}
      <line
        x1={cx + 26 * Math.cos(toRad(sDeg + 180))}
        y1={cy + 26 * Math.sin(toRad(sDeg + 180))}
        x2={cx + rDial * 0.86 * Math.cos(toRad(sDeg))}
        y2={cy + rDial * 0.86 * Math.sin(toRad(sDeg))}
        stroke={color} strokeWidth="1.1" strokeLinecap="round"
        filter="url(#handShadow)"
      />
      {/* Second hand counterbalance paddle */}
      <ellipse
        cx={cx + 20 * Math.cos(toRad(sDeg + 180))}
        cy={cy + 20 * Math.sin(toRad(sDeg + 180))}
        rx="4" ry="2.5"
        fill={color} opacity="0.9"
        transform={`rotate(${sDeg + 90} ${cx + 20 * Math.cos(toRad(sDeg + 180))} ${cy + 20 * Math.sin(toRad(sDeg + 180))})`}
      />

      {/* ── CENTRE CAP ── */}
      {/* Outer ring */}
      <circle cx={cx} cy={cy} r={9}   fill="url(#bezelGold)" />
      {/* Main cap */}
      <circle cx={cx} cy={cy} r={7}   fill="url(#capGold)" />
      {/* Inner jewel */}
      <circle cx={cx} cy={cy} r={3.5} fill="#2A1A0A" />
      <circle cx={cx} cy={cy} r={2}   fill="rgba(240,200,80,0.6)" />
      <circle cx={cx + 1} cy={cy - 1} r={0.8} fill="rgba(255,255,255,0.7)" />
    </svg>
  );
}

// ─── LOCATION SELECTOR ─────────────────────────────────────────────
// Replaces the old LocationCard. Provides a native <select> grouped by
// region so any user worldwide can instantly calibrate their local dawn.
// GPS is offered as the first option for precise automatic detection.
// Also shows the current moon phase (~29.53-day synodic lunar cycle).
function LocationSelector({ selectedCity, onCityChange, onGPS, gpsStatus, info, moonDay, moonPhase, moonIllumination, season }) {
  const city = CITIES.find(c => c.key === selectedCity);
  const isGPS = selectedCity === 'gps';
  const displayFlag = isGPS ? '📍' : (city ? city.flag : '🇳🇬');
  const displayName = isGPS
    ? (gpsStatus === 'located' ? (info ? info.city : 'GPS Location') : 'Detecting location…')
    : (city ? city.name : 'Lagos, Nigeria');

  function handleChange(e) {
    const key = e.target.value;
    if (key === 'gps') { onGPS(); }
    else { onCityChange(key); }
  }

  return (
    <div className="loc-interactive" style={{ padding:'11px 14px', borderRadius:'12px', border:'1px solid rgba(196,169,106,0.28)', background:'linear-gradient(135deg,rgba(196,169,106,0.09),rgba(196,169,106,0.03))' }}>
      {/* Current city summary row */}
      <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'9px' }}>
        <span style={{ fontSize:'17px', lineHeight:1 }}>
          {gpsStatus === 'requesting'
            ? <span style={{ display:'inline-block', animation:'spin 1s linear infinite' }}>◌</span>
            : displayFlag}
        </span>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:'11px', fontWeight:700, color:'var(--ylt-t1)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
            {displayName}{selectedCity === 'ileife' ? ' — YLT Home 🏠' : ''}
          </div>
          {selectedCity === 'ileife' && (
            <div style={{ fontSize:'9.5px', color:'var(--ylt-t3)', fontStyle:'italic', fontFamily:"'Cormorant Garamond',serif", marginBottom:'2px', lineHeight:1.3 }}>
              "Ilé Ifè ní ibi ti ojúmó ti ń mó wá"
            </div>
          )}
          <div style={{ fontSize:'10px', color:'var(--ylt-t3)' }}>
            Local dawn: {info ? info.label : '—'}
            {season && <span> · {season.icon} {season.name}</span>}
            {gpsStatus === 'denied' && <span style={{ color:'#EF4444' }}> · GPS denied, select manually</span>}
          </div>
        </div>
        {gpsStatus === 'located' && <span style={{ fontSize:'13px', color:'#16A34A', flexShrink:0 }}>✓</span>}
      </div>

      {/* Moon phase row */}
      {moonPhase && (
        <div style={{ padding:'8px 0 9px', borderTop:'1px solid rgba(196,169,106,0.18)', borderBottom:'1px solid rgba(196,169,106,0.18)', marginBottom:'9px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'9px' }}>
            <span style={{ fontSize:'22px', lineHeight:1 }}>{moonPhase.icon}</span>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:'11px', fontWeight:700, color:'var(--ylt-t1)' }}>
                {moonPhase.name}
              </div>
              <div style={{ fontSize:'10px', color:'var(--ylt-t3)', fontStyle:'italic' }}>{moonPhase.subPhase}</div>
            </div>
            <div style={{ textAlign:'right', flexShrink:0 }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'17px', fontWeight:700, color:'#C4A96A', lineHeight:1 }}>Day {moonDay}</div>
              <div style={{ fontSize:'9px', color:'var(--ylt-t4)' }}>of 29.53 days (synodic)</div>
            </div>
          </div>

            </div>
            <span style={{ fontSize:'10px', color:'var(--ylt-t3)', flexShrink:0, minWidth:'32px', textAlign:'right' }}>{moonIllumination}% lit</span>

      {/* City dropdown */}
      <select

        style={{

          border:'1px solid rgba(196,169,106,0.45)',

          fontSize:'11.5px', fontFamily:"'DM Sans',sans-serif",
          cursor:'pointer', outline:'none',
        }}

        <option value="gps">📍 Use GPS — detect my location automatically</option>
        <option disabled value="">──────────────────────────────</option>
        {CITY_REGIONS.map(region => (
          <optgroup key={region.label} label={region.label}>
            {region.keys.map(key => {
              const c = CITIES.find(x => x.key === key);
              return c
                ? <option key={key} value={key}>{c.flag} {c.name}</option>
                : null;
            })}
          </optgroup>
        ))}
      </select>
    </div>
  );
}

// ─── YLT NOTIFICATION SCHEDULER ────────────────────────────────────
// Lets users set daily recurring browser notifications at specific YLT times.
// Persists to localStorage. Fires via the Web Notifications API.
function YLTNotifications({ yH, yM, open, setOpen, t = {} }) {
  const hasNotifAPI = typeof Notification !== 'undefined';
  const [permStatus, setPermStatus] = useState(hasNotifAPI ? Notification.permission : 'unavailable');
  const [notifs,     setNotifs]     = useState(() => {
    try { return JSON.parse(localStorage.getItem('ylt-notifs') || '[]'); } catch { return []; }
  });
  const [addH,     setAddH]     = useState('');
  const [addM,     setAddM]     = useState('');
  const [addLabel, setAddLabel] = useState('');
  const firedRef = useRef(new Set());

  function requestPerm() {
    Notification.requestPermission().then(p => setPermStatus(p));
  }

  function save(list) {
    setNotifs(list);
    localStorage.setItem('ylt-notifs', JSON.stringify(list));
  }

  function addNotif() {
    const h = parseInt(addH), m = parseInt(addM) || 0;
    if (!h || h < 1 || h > 16 || m < 0 || m > 59) return;
    const label = addLabel.trim() || `YLT ${fmt2(h)}:${fmt2(m)}`;
    save([...notifs, { id: Date.now(), yH: h, yM: m, label, enabled: true }]);
    setAddH(''); setAddM(''); setAddLabel('');
  }

  function remove(id)  { save(notifs.filter(n => n.id !== id)); }
  function toggle(id)  { save(notifs.map(n => n.id === id ? { ...n, enabled: !n.enabled } : n)); }

  // Fire notification when YLT time matches a saved alert
  useEffect(() => {
    if (permStatus !== 'granted') return;
    const key = `${yH}:${yM}`;
    if (firedRef.current.has(key)) return;
    notifs.forEach(n => {
      if (n.enabled && n.yH === yH && n.yM === yM) {
        firedRef.current.add(key);
        try {
          new Notification('🐓 YLT Reminder', { body: n.label, icon: 'icon-192.png' });
        } catch (e) { /* blocked */ }
      }
    });
    // Prune fired set so it doesn't grow unbounded
    if (firedRef.current.size > 20) {
      const arr = [...firedRef.current];
      firedRef.current = new Set(arr.slice(-10));
    }
  }, [yH, yM]);

  const inp = { width:'52px', padding:'7px 4px', borderRadius:'7px', border:'1px solid rgba(139,115,85,0.3)', background:'var(--ylt-inp)', color:'var(--ylt-t1)', fontSize:'16px', textAlign:'center', fontFamily:"'Cormorant Garamond',serif", fontWeight:700, outline:'none' };

  return (
    <div style={{ width:'100%', borderRadius:'12px', background:'var(--ylt-card)', border:'1px solid var(--ylt-card-b)', overflow:'hidden' }}>
      {/* Header row — always visible */}
      <button onClick={() => setOpen(o => !o)} style={{ width:'100%', display:'flex', alignItems:'center', gap:'10px', padding:'12px 14px', background:'transparent', border:'none', cursor:'pointer' }}>
        <div style={{ fontSize:'18px', flexShrink:0 }}>🔔</div>
        <div style={{ flex:1, textAlign:'left' }}>
          <div style={{ fontSize:'11px', fontWeight:700, color:'var(--ylt-t1)' }}>{t.setNotif||'Set Notification'}</div>
          <div style={{ fontSize:'10px', color:'var(--ylt-t3)' }}>
            {notifs.filter(n => n.enabled).length > 0
              ? `${notifs.filter(n => n.enabled).length} active alert${notifs.filter(n => n.enabled).length > 1 ? 's' : ''}`
              : 'Set daily alerts by YLT time'}
          </div>
        </div>
        <span style={{ fontSize:'14px', color:'#C4A96A', fontWeight:700 }}>{open ? '−' : '+'}</span>
      </button>

      {open && (
        <div style={{ padding:'0 14px 14px', animation:'fadeIn 0.2s ease' }}>
          {/* Permission state */}
          {!hasNotifAPI && (
            <div style={{ fontSize:'11px', color:'var(--ylt-t3)', padding:'8px 10px', borderRadius:'8px', background:'var(--ylt-panel)', marginBottom:'12px' }}>
              Browser notifications are not available in this environment.
            </div>
          )}
          {hasNotifAPI && permStatus === 'default' && (
            <button onClick={requestPerm} style={{ width:'100%', padding:'9px', borderRadius:'9px', background:'linear-gradient(135deg,#C4A96A,#A8893C)', color:'white', border:'none', cursor:'pointer', fontSize:'12px', fontWeight:700, letterSpacing:'1px', marginBottom:'12px', boxShadow:'0 2px 8px rgba(168,137,60,0.3)' }}>
              🔔 Allow Notifications
            </button>
          )}
          {hasNotifAPI && permStatus === 'denied' && (
            <div style={{ fontSize:'11px', color:'#EF4444', marginBottom:'10px', padding:'8px 10px', borderRadius:'8px', background:'rgba(239,68,68,0.08)' }}>
              Notifications are blocked. Please enable them in your browser settings.
            </div>
          )}

          {/* Add alert form — show regardless so users can pre-fill */}
          <div style={{ marginBottom:'12px', padding:'10px 12px', borderRadius:'10px', background:'var(--ylt-panel)', border:'1px solid var(--ylt-panel-b)' }}>
            <div style={{ fontSize:'10px', color:'var(--ylt-t3)', textTransform:'uppercase', letterSpacing:'0.8px', fontWeight:600, marginBottom:'8px' }}>Add Alert</div>
            <div style={{ display:'flex', alignItems:'center', gap:'6px', marginBottom:'8px' }}>
              <input type="number" min={1} max={16} placeholder="HH" value={addH} onChange={e => setAddH(e.target.value)} style={inp} />
              <span style={{ fontSize:'18px', fontWeight:700, color:'var(--ylt-t3)' }}>:</span>
              <input type="number" min={0} max={59} placeholder="MM" value={addM} onChange={e => setAddM(e.target.value)} style={inp} />
              <span style={{ fontSize:'11px', color:'var(--ylt-t4)', marginRight:'auto' }}>YLT</span>
              <button onClick={addNotif} style={{ padding:'7px 14px', borderRadius:'8px', background:'linear-gradient(135deg,#C4A96A,#A8893C)', color:'white', border:'none', cursor:'pointer', fontSize:'13px', fontWeight:700, flexShrink:0 }}>+</button>
            </div>
            <input
              type="text" placeholder="Label (optional — e.g. Morning prayer)"
              value={addLabel} onChange={e => setAddLabel(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addNotif()}
              style={{ width:'100%', padding:'7px 10px', borderRadius:'8px', border:'1px solid rgba(139,115,85,0.25)', background:'var(--ylt-inp)', color:'var(--ylt-t1)', fontSize:'11px', fontFamily:"'DM Sans',sans-serif", outline:'none' }}
            />
          </div>

          {/* Saved alerts */}
          {notifs.length === 0 && (
            <div style={{ fontSize:'11px', color:'var(--ylt-t4)', textAlign:'center', padding:'8px 0', fontStyle:'italic' }}>No alerts set yet</div>
          )}
          {notifs.map(n => (
            <div key={n.id} style={{ display:'flex', alignItems:'center', gap:'8px', padding:'8px 10px', borderRadius:'9px', background: n.enabled ? 'rgba(196,169,106,0.08)' : 'var(--ylt-panel)', border:`1px solid ${n.enabled ? 'rgba(196,169,106,0.25)' : 'var(--ylt-panel-b)'}`, marginBottom:'6px' }}>
              <button onClick={() => toggle(n.id)} style={{ fontSize:'15px', background:'none', border:'none', cursor:'pointer', padding:0, flexShrink:0 }}>{n.enabled ? '🔔' : '🔕'}</button>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'14px', fontWeight:700, color: n.enabled ? '#C4A96A' : 'var(--ylt-t4)' }}>{fmt2(n.yH)}:{fmt2(n.yM)} YLT</div>
                <div style={{ fontSize:'10px', color:'var(--ylt-t3)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{n.label}</div>
              </div>
              <button onClick={() => remove(n.id)} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--ylt-t4)', fontSize:'16px', lineHeight:1, padding:'0 2px', flexShrink:0 }}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── DOGON COSMOS COMPONENT ────────────────────────────────────────
function DogonCosmos({ isDark, t }) {
  const now = new Date();
  const jd  = calcJD(now);

  // Sun
  const sunLon    = calcSunLon(jd);
  const sunSign   = getZodiac(sunLon);
  const sunWisdom = DOGON_WISDOM.solar[sunSign.name] || DOGON_WISDOM.solar['Aries'];

  // Moon phase
  const moonAge  = ((jd - 2451550.1) % 29.53058731 + 29.53058731) % 29.53058731;
  const mphIdx   = Math.floor(moonAge / 3.69) % 8;
  const moonWisdom = DOGON_WISDOM.lunar[mphIdx];
  const moonIllum  = Math.round((1 - Math.cos((moonAge / 29.53058731) * 2 * Math.PI)) / 2 * 100);
  const MNAMES = t.cosmosMoonNames || ['New Moon','Waxing Crescent','First Quarter','Waxing Gibbous',
                  'Full Moon','Waning Gibbous','Last Quarter','Waning Crescent'];
  const MEMOJI = ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'];
  const moonPhaseName = MNAMES[mphIdx];
  const moonEmoji     = MEMOJI[mphIdx];
  const moonLon       = calcMoonLon(jd);
  const moonSign      = getZodiac(moonLon);

  // Sirius
  const siriusData = getSiriusData(jd);
  const siriusKey  = siriusData.heliacalSoon ? 'heliacal_soon'
                   : siriusData.visible ? (siriusData.visibility === 'morning' ? 'visible_morning' : 'visible_evening')
                   : 'solar';
  const siriusWisdom = DOGON_WISDOM.sirius[siriusKey];

  // Planets — translate labels via t.cosmosPlanetNames
  const pnames = t.cosmosPlanetNames || {};
  const PLANETS = [
    { key:'mercury', label: pnames.mercury||'Mercury', emoji:'☿', color:'#94A3B8' },
    { key:'venus',   label: pnames.venus  ||'Venus',   emoji:'♀', color:'#F0ABFC' },

    { key:'saturn',  label: pnames.saturn ||'Saturn',  emoji:'♄', color:'#86EFAC' },
  ].map(p => {
    const lon  = calcPlanetLon(p.key, jd);

  // Daily verse

        <div style={{ fontSize:'12px', color:'var(--ylt-t3)', fontStyle:'italic' }}>{t.cosmosSubtitle || "Dogon Sky Science · Amma's Living Cosmos"}</div>

}

// ─── ORISHA SUBSCRIPTIONS COMPONENT ───────────────────────────────
function OrishaSubscriptions({ orishaIdx, open, setOpen, t = {} }) {
  const hasNotifAPI = typeof Notification !== 'undefined';
  const [perm, setPerm]     = useState(hasNotifAPI ? Notification.permission : 'unavailable');
  const [subs, setSubs]     = useState(() => {
    try { return JSON.parse(localStorage.getItem('ylt-orisha-subs') || '[]'); } catch { return []; }
  });
  const [email, setEmail]   = useState(() => localStorage.getItem('ylt-orisha-email') || '');
  const [emailDraft, setEmailDraft] = useState('');
  const [emailSaved, setEmailSaved] = useState(false);
  const [regStatus, setRegStatus]   = useState({}); // { [idx]: 'idle'|'sending'|'sent'|'error' }

  // Build a mailto: href that sends the full insight to the user's own inbox
  function buildInsightMailto(idx) {
    const n = ORISHA_NOTIFICATIONS[idx];
    const d = ORISHA[idx];
    const subj = encodeURIComponent(n.notifTitle + ' \u2014 YLT Orisha Insight');
    const practices = n.practices.map((p, i) => (i+1) + '. ' + p).join('\n\n');
    const body = encodeURIComponent(
      n.salutation + '\n\n' +
      n.headline + '\n\n' +
      n.essence + '\n\n' +
      n.deepInsight + '\n\n' +
      '--- ' + n.practiceTitle + ' ---\n\n' +
      practices + '\n\n' +
      '---\n\n' +
      n.closing + '\n\n' +
      n.mantra + '\n\n' +
      'Sent from Yoruba Land Time (YLT) - Ase!'
    );
    const to = email || '';
    return 'mailto:' + to + '?subject=' + subj + '&body=' + body;
  }

  // Build a registration mailto to YLT admin so the team knows who subscribed
  function buildRegMailto(idx) {
    const d = ORISHA[idx];
    const subj = encodeURIComponent('New Orisha Subscription: ' + d.short + ' Day');
    const body = encodeURIComponent(
      'A new subscriber has registered for ' + d.short + ' Day insights.\n\n' +
      'Email: ' + (email || '(not provided)') + '\n' +
      'Orisha: ' + d.name + '\n' +
      'Focus: ' + d.focus + '\n\n' +
      'Please add this subscriber to your Orisha Day insights mailing list.'
    );
    return 'mailto:yorubalandtime@gmail.com?subject=' + subj + '&body=' + body;
  }

  function saveEmail() {
    const trimmed = emailDraft.trim();
    if (!trimmed || !trimmed.includes('@')) return;
    setEmail(trimmed);
    localStorage.setItem('ylt-orisha-email', trimmed);
    setEmailDraft('');
    setEmailSaved(true);
    setTimeout(() => setEmailSaved(false), 3000);
    // Auto-send confirmation if EmailJS is configured
    if (ejsReady()) {
      const subList = ORISHA.filter((_, i) => subs.includes(i)).map(d => d.short).join(', ') || 'none yet';
      ejsSend({
        to_email: trimmed,
        subject:  'Welcome to YLT Orisha Day Alerts \u2014 \u00c0\u1e63\u1eb9\u0300!',
        message:  'E ku iwole \u2014 welcome.\n\n' +
                  'Your email has been registered with Yoruba Land Time (YLT) for Orisha Day insights.\n\n' +
                  'Subscribed Orisha days: ' + subList + '\n\n' +
                  'On each of your subscribed Orisha days, a full sacred insight \u2014 including essence, deep teaching, three sacred attentions, closing reflection, and mantra \u2014 will be sent to this address.\n\n' +
                  'If you wish to manage your subscriptions, open the YLT app and visit the Orisha tab.\n\n' +
                  '\u00c0\u1e63\u1eb9\u0300!\n' +
                  'Yoruba Land Time \u00b7 Rooted in the Kojoda Tradition\n' +
                  'Conceived by Oni Olufemi (Afonrere)',
      }).catch(() => {}); // silent fail — mailto fallback still available
    }
  }

  function clearEmail() {
    setEmail('');
    setEmailDraft('');
    localStorage.removeItem('ylt-orisha-email');
  }

  function saveSubs(next) {
    setSubs(next);
    localStorage.setItem('ylt-orisha-subs', JSON.stringify(next));
  }

  async function requestPerm() {
    if (!hasNotifAPI) return;
    const result = await Notification.requestPermission();
    setPerm(result);
  }

  function toggleSub(idx) {
    saveSubs(subs.includes(idx) ? subs.filter(i => i !== idx) : [...subs, idx]);
  }

  const card      = { borderRadius:'16px', border:'1px solid var(--ylt-card-b)', overflow:'hidden' };
  const orIsToday = (idx) => idx === orishaIdx;
  const orIsSub   = (idx) => subs.includes(idx);

  const emailValid = email && email.includes('@');

  return (
    <div style={{ ...card, borderRadius:'12px' }}>
      {/* Always-visible status strip */}
      <div style={{ display:'flex', alignItems:'center', gap:'10px', padding:'10px 14px', background:'var(--ylt-card)' }}>
        <span style={{ fontSize:'16px', flexShrink:0 }}>🔔</span>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:'11px', fontWeight:700, color:'var(--ylt-t1)' }}>{t.osubAlertsTitle||'Ọrísà Day Alerts'}</div>

            {subs.length === 0

        </div>
        {subs.length > 0 && (
          <div style={{ padding:'2px 8px', borderRadius:'12px', background:'rgba(196,169,106,0.18)', border:'1px solid rgba(196,169,106,0.3)', fontSize:'10px', fontWeight:700, color:'#C4A96A' }}>{subs.length}</div>
        )}
      </div>

      {open && (
      <div style={{ padding:'0 16px 16px', background:'var(--ylt-card)', borderTop:'1px solid var(--ylt-card-b2)' }}>

          {/* ── EMAIL SECTION ── */}
          <div style={{ marginTop:'14px', padding:'14px', borderRadius:'12px', background:'rgba(196,169,106,0.07)', border:'1px solid rgba(196,169,106,0.2)' }}>
            <div style={{ fontSize:'9px', fontWeight:700, color:'#C4A96A', textTransform:'uppercase', letterSpacing:'1.5px', marginBottom:'8px' }}>{t.osubEmailInsights||'✉ Email Insights'}</div>
            {emailValid ? (
              <div>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:'8px' }}>
                  <div style={{ fontSize:'12px', color:'var(--ylt-t2)', fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>✓ {email}</div>
                  <button onClick={clearEmail} style={{ padding:'4px 10px', borderRadius:'16px', border:'1px solid rgba(139,115,85,0.3)', background:'transparent', color:'var(--ylt-t3)', fontSize:'10px', cursor:'pointer', flexShrink:0 }}>{t.osubChange||'Change'}</button>
                </div>

              </div>

// ─── TIME CONVERTER ────────────────────────────────────────────────
function TimeConverter({ dawnSecs, t }) {
  const [mode, setMode] = useState('s2y');
  const [iH, setIH] = useState('');
  const [iM, setIM] = useState('');
  const [result, setResult] = useState(null);

  const convert = () => {
    const h = parseInt(iH) || 0, m = parseInt(iM) || 0;
    if (mode === 's2y') {
      if (h < 0 || h > 23 || m < 0 || m > 59) return;
      const { yH, yM } = stdSecsToYLT(h * 3600 + m * 60, dawnSecs);
      setResult(`${fmt2(yH)}:${fmt2(yM)} YLT`);
    } else {
      if (h < 1 || h > 16 || m < 0 || m > 59) return;
      const s = yltToStdSecs(h, m, dawnSecs);
      setResult(`${fmtTime12(s)} WAT`);
    }
  };

  const inp = { width:'62px', padding:'10px 6px', borderRadius:'8px', border:'1px solid rgba(139,115,85,0.3)', background:'var(--ylt-inp)', fontSize:'20px', textAlign:'center', fontFamily:"'Cormorant Garamond',serif", fontWeight:700, color:'var(--ylt-t1)', outline:'none' };

  return (
    <div style={{ background:'var(--ylt-card)', borderRadius:'16px', padding:'20px', border:'1px solid var(--ylt-card-b)' }}>
      <div style={{ display:'flex', gap:'4px', marginBottom:'16px' }}>
        {[['s2y', t ? t.s2yLabel : 'Standard → YLT'],['y2s', t ? t.y2sLabel : 'YLT → Standard']].map(([k,lb]) => (
          <button key={k} onClick={() => { setMode(k); setResult(null); setIH(''); setIM(''); }} style={{ flex:1, padding:'8px 6px', borderRadius:'8px', border:'none', cursor:'pointer', background: mode===k ? '#C4A96A' : 'rgba(139,115,85,0.1)', color: mode===k ? '#2D1A08' : 'var(--ylt-t2)', fontSize:'12px', fontWeight:600, transition:'all 0.3s' }}>{lb}</button>
        ))}
      </div>
      <div style={{ display:'flex', alignItems:'center', gap:'8px', justifyContent:'center', marginBottom:'12px' }}>
        <input type="number" min={mode==='s2y' ? 0 : 1} max={mode==='s2y' ? 23 : 16} placeholder="HH" value={iH} onChange={e => setIH(e.target.value)} onKeyDown={e => e.key === 'Enter' && convert()} style={inp} />
        <span style={{ fontSize:'24px', fontWeight:700, color:'var(--ylt-t3)' }}>:</span>
        <input type="number" min={0} max={59} placeholder="MM" value={iM} onChange={e => setIM(e.target.value)} onKeyDown={e => e.key === 'Enter' && convert()} style={inp} />
        <span style={{ fontSize:'12px', color:'var(--ylt-t4)', minWidth:'52px' }}>{mode==='s2y' ? (t ? t.qrStd : 'Standard') : 'YLT'}</span>
      </div>
      <button onClick={convert} style={{ width:'100%', padding:'10px', borderRadius:'10px', border:'none', background:'linear-gradient(135deg,#C4A96A,#A8893C)', color:'white', fontSize:'14px', fontWeight:700, cursor:'pointer', letterSpacing:'1px', boxShadow:'0 2px 8px rgba(168,137,60,0.3)' }}>{t ? t.convertBtn : 'CONVERT'}</button>
      {result && (
        <div style={{ marginTop:'14px', textAlign:'center', padding:'12px', borderRadius:'10px', background:'rgba(196,169,106,0.1)', border:'1px solid rgba(196,169,106,0.3)', animation:'fadeIn 0.3s ease' }}>
          <div style={{ fontSize:'10px', color:'var(--ylt-t3)', textTransform:'uppercase', letterSpacing:'1px', marginBottom:'4px' }}>{t ? t.resultLabel : 'Result'}</div>
          <div style={{ fontSize:'26px', fontWeight:700, fontFamily:"'Cormorant Garamond',serif", color:'var(--ylt-t1)' }}>{result}</div>
        </div>
      )}
    </div>
  );
}

function QuickReference({ dawnSecs, t }) {

  const rows = [1,3,5,7,9,11,13,15].map((yH,i) => {
    const s = yltToStdSecs(yH, 0, dawnSecs);
    return [fmtTime12(s), `${fmt2(yH)}:00`, labels[i]];
  });
  const th = { padding:'7px 8px', fontWeight:700, color:'var(--ylt-t3)', textTransform:'uppercase', fontSize:'10px', letterSpacing:'1px', borderBottom:'2px solid rgba(139,115,85,0.2)' };

      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'16px', fontWeight:700, color:'var(--ylt-t1)', marginBottom:'12px' }}>{t ? t.qrTitle : 'Quick Reference'}</div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr' }}>
        {[t ? t.qrStd : 'Standard', 'YLT', t ? t.qrPeriod : 'Period'].map((h,i) => <div key={i} style={th}>{h}</div>)}

    </div>
  );
}

// ─── AGOGO GREETING CHAT ───────────────────────────────────────────
// Conversational welcome shown on first visit.
// Opens in English so any visitor understands immediately.
// Yorùbá is woven in naturally — not assumed.

function AgogoChatGreeting({ yH, yM, phase, isDark, onComplete, moonPhase }) {
  const [step,    setStep]    = useState(0);
  const [input,   setInput]   = useState('');
  const [name,    setName]    = useState('');
  const [visible, setVisible] = useState(true);
  const [typing,  setTyping]  = useState(false);
  const [msgs,    setMsgs]    = useState([]);
  const inputRef  = useRef(null);
  const scrollRef = useRef(null);

  const yltTimeStr = `${String(yH).padStart(2,'0')}:${String(yM).padStart(2,'0')}`;
  const pIdx       = getPhaseIdx(yH, yM);
  const pNameYo    = ['Ojúmọ́','Òwúrọ̀','Ìyálẹ̀ta','Òsán','Ìròlẹ́','Alẹ́','Òru','Àfẹ̀mọ́jumọ́'][pIdx];
  const moonLine   = moonPhase
    ? `The moon is in ${moonPhase.subPhase} — ${moonPhase.desc}`
    : '';

  // Opening lines: English-first, universal, with Yorùbá as discovery
  const openingLines = [
    `Welcome. 🌅`,
    `Here, the day begins at dawn — not midnight.`,
    `This is Yorùbá Land Time (YLT).\nRight now it is ${yltTimeStr} — the phase of ${phase.meaning} (${pNameYo}).`,
    moonLine || `${phase.energy}`,
    `What's your name?`,
  ];

  function pushAgogo(lines, delay = 0) {
    let t = delay;
    lines.forEach((line, i) => {
      if (!line) return;
      const isLast = i === lines.length - 1;
      setTimeout(() => {
        setTyping(true);
        setTimeout(() => {
          setTyping(false);
          setMsgs(m => [...m, { from:'agogo', text:line }]);
          if (isLast) setTimeout(() => inputRef.current?.focus(), 200);
        }, 800 + line.length * 12);
      }, t);
      t += 860 + line.length * 12;
    });
    return t;
  }

  useEffect(() => {
    pushAgogo(openingLines, 500);
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [msgs, typing]);

  function handleSubmit() {
    const val = input.trim();
    if (!val) return;

    if (step === 0) {
      const capName = val.charAt(0).toUpperCase() + val.slice(1);
      setName(capName);
      setMsgs(m => [...m, { from:'user', text: val }]);
      setInput('');

      const responses = [
        `${capName}. Good to have you here. 🙏`,
        `${phase.energy}`,
        `In Yorùbá this moment is called ${pNameYo}.\n"${phase.greeting}" — ${phase.greetingEn}.`,
        `Àṣẹ. Let time begin at dawn. ✨`,
      ];

      const total = pushAgogo(responses, 350);
      setTimeout(() => {
        localStorage.setItem('ylt-user-name', capName);
        localStorage.setItem('ylt-greeted', '1');
        setStep(1);
        setTimeout(() => { setVisible(false); setTimeout(onComplete, 600); }, 1800);
      }, total + 600);
    }
  }

  function handleKey(e) { if (e.key === 'Enter') handleSubmit(); }

  if (!visible) return null;

  const bg    = isDark
    ? 'linear-gradient(180deg,rgba(8,5,2,0.98) 0%,rgba(12,7,3,0.99) 100%)'
    : 'linear-gradient(180deg,rgba(253,248,240,0.98) 0%,rgba(245,237,224,0.99) 100%)';
  const bubble = (from, text, key) => {
    const isAgogo = from === 'agogo';
    return (
      <div key={key} style={{
        display:'flex', justifyContent: isAgogo ? 'flex-start' : 'flex-end',
        marginBottom:'10px', animation:'fadeIn 0.35s ease',
      }}>
        {isAgogo && (
          <div style={{ width:'28px', height:'28px', borderRadius:'50%', background:'linear-gradient(135deg,#C4A96A,#8B7030)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'13px', flexShrink:0, marginRight:'8px', alignSelf:'flex-end', marginBottom:'2px' }}>🐓</div>
        )}
        <div style={{
          maxWidth:'75%', padding:'10px 14px', borderRadius: isAgogo ? '4px 16px 16px 16px' : '16px 4px 16px 16px',
          background: isAgogo
            ? (isDark ? 'rgba(196,169,106,0.13)' : 'rgba(196,169,106,0.14)')
            : 'linear-gradient(135deg,#C4A96A,#A8893C)',
          border: isAgogo ? '1px solid rgba(196,169,106,0.28)' : 'none',
          color: isAgogo ? 'var(--ylt-t1)' : 'white',
          fontSize:'13.5px', lineHeight:1.65,
          fontFamily: isAgogo ? "'Cormorant Garamond',serif" : "'DM Sans',sans-serif",
          fontWeight: isAgogo ? 600 : 500,
          whiteSpace:'pre-wrap',
          boxShadow: isAgogo ? 'none' : '0 2px 12px rgba(168,137,60,0.35)',
        }}>
          {text}
        </div>
      </div>
    );
  };

  return (
    <div style={{
      position:'fixed', inset:0, zIndex:500,
      background: bg,
      display:'flex', flexDirection:'column',
      animation:'fadeIn 0.5s ease',
    }}>
      {/* Header */}
      <div style={{ padding:'18px 20px 14px', borderBottom:`1px solid rgba(196,169,106,0.18)`, display:'flex', alignItems:'center', gap:'12px' }}>
        <div style={{ width:'40px', height:'40px', borderRadius:'50%', background:'linear-gradient(135deg,#C4A96A,#8B7030)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'20px', boxShadow:'0 2px 12px rgba(196,169,106,0.35)' }}>🐓</div>
        <div>
          <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'17px', fontWeight:700, color:'var(--ylt-t1)', lineHeight:1.1 }}>Àgogo</div>
          <div style={{ fontSize:'10px', color:'#C4A96A', letterSpacing:'1.5px', textTransform:'uppercase' }}>Yorùbá Land Time · {yltTimeStr}</div>
        </div>
        {/* Phase chip */}
        <div style={{ marginLeft:'auto', padding:'4px 12px', borderRadius:'20px', background:`${phase.color}22`, border:`1px solid ${phase.color}55`, fontSize:'11px', fontWeight:700, color:phase.color }}>
          {phase.icon} {phase.yoruba}
        </div>
      </div>

      {/* Message thread */}
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', padding:'20px 16px 8px' }}>
        {msgs.map((m, i) => bubble(m.from, m.text, i))}
        {/* Typing indicator */}
        {typing && (
          <div style={{ display:'flex', alignItems:'flex-end', gap:'8px', marginBottom:'10px' }}>
            <div style={{ width:'28px', height:'28px', borderRadius:'50%', background:'linear-gradient(135deg,#C4A96A,#8B7030)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'13px', flexShrink:0 }}>🐓</div>
            <div style={{ padding:'10px 16px', borderRadius:'4px 16px 16px 16px', background: isDark ? 'rgba(196,169,106,0.10)' : 'rgba(196,169,106,0.12)', border:'1px solid rgba(196,169,106,0.22)', display:'flex', gap:'5px', alignItems:'center' }}>
              {[0,1,2].map(i => (
                <div key={i} style={{ width:'6px', height:'6px', borderRadius:'50%', background:'#C4A96A', animation:`pulse 1.2s ease-in-out ${i*0.2}s infinite` }} />
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Input bar */}
      {step === 0 && (
        <div style={{ padding:'12px 16px 28px', borderTop:`1px solid rgba(196,169,106,0.15)`, display:'flex', gap:'10px', alignItems:'center' }}>
          <input
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={handleKey}
            placeholder="Your name…"
            style={{
              flex:1, padding:'12px 16px', borderRadius:'24px',
              border:`1px solid rgba(196,169,106,${input ? '0.6' : '0.25'})`,
              background: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.85)',
              color:'var(--ylt-t1)', fontSize:'14px',
              fontFamily:"'DM Sans',sans-serif", outline:'none',
              transition:'border-color 0.2s',
            }}
          />
          <button
            onClick={handleSubmit}
            disabled={!input.trim()}
            style={{
              width:'44px', height:'44px', borderRadius:'50%', border:'none',
              background: input.trim() ? 'linear-gradient(135deg,#C4A96A,#A8893C)' : 'rgba(196,169,106,0.2)',
              color: input.trim() ? 'white' : 'rgba(196,169,106,0.5)',
              fontSize:'18px', cursor: input.trim() ? 'pointer' : 'default',
              display:'flex', alignItems:'center', justifyContent:'center',
              flexShrink:0, transition:'all 0.2s',
              boxShadow: input.trim() ? '0 2px 12px rgba(168,137,60,0.4)' : 'none',
            }}
          >↑</button>
        </div>
      )}
    </div>
  );
}

// ─── ORISHA CALENDAR ───────────────────────────────────────────────
function OrishaCalendar({ dawnSecs, isDark, onSelectDay, t = {}, lang = 'en' }) {
  const now = new Date();
  // YLT days turn at dawn, not midnight. If it's before dawn in Lagos WAT,
  // the current YLT day is still the previous calendar day.
  const isPreDawn = dawnSecs != null && lagosTimeSecs(now) < dawnSecs;
  const yltToday  = isPreDawn ? new Date(now.getTime() - 86400000) : now;
  const [view, setView] = React.useState({ y: yltToday.getFullYear(), m: yltToday.getMonth() });
  const [selDay, setSelDay] = React.useState(yltToday.getDate());

  const { y, m } = view;
  const firstDow = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const monthLocale = lang === 'fr' ? 'fr' : lang === 'es' ? 'es' : 'en';
  const monthName = new Date(y, m, 1).toLocaleString(monthLocale, { month: 'long', year: 'numeric' });

  const getLunarFrac = (date) => {
    const elapsed = date.getTime() - LUNAR_EPOCH_MS;
    return ((elapsed / SYNODIC_MS) % 1 + 1) % 1;
  };
  const moonEmoji = (frac) => {
    const p = Math.floor(frac * 8);
    return ['🌑','🌒','🌓','🌔','🌕','🌖','🌗','🌘'][p] || '🌑';
  };

  const days = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(y, m, d, 12, 0, 0);
    const oIdx = getOrishaIdx(date, dawnSecs);
    const frac = getLunarFrac(date);
    const isToday = d === yltToday.getDate() && m === yltToday.getMonth() && y === yltToday.getFullYear();
    days.push({ d, date, oIdx, orisha: ORISHA[oIdx], frac, moon: moonEmoji(frac), isToday });
  }

  const sel = days.find(x => x.d === selDay);

  const navBtn = (dir) => () => setView(v => {
    const nd = new Date(v.y, v.m + dir, 1);
    return { y: nd.getFullYear(), m: nd.getMonth() };
  });

  const accent = '#C4A96A';
  const cardBg = isDark ? 'rgba(18,11,5,0.80)' : 'rgba(255,255,255,0.7)';

  return (
    <div style={{ borderRadius:'16px', overflow:'hidden', border:'1px solid rgba(196,169,106,0.28)', background:'var(--ylt-card)' }}>
      {/* Month nav */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 14px 8px', background: isDark ? 'rgba(196,169,106,0.08)' : 'rgba(196,169,106,0.05)', borderBottom:'1px solid rgba(196,169,106,0.14)' }}>
        <button onClick={navBtn(-1)} style={{ background:'none', border:'none', cursor:'pointer', color:accent, fontSize:'20px', lineHeight:1, padding:'0 6px', fontWeight:300 }}>‹</button>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'15px', fontWeight:700, color:'var(--ylt-t1)', textAlign:'center' }}>{monthName}</div>
        <button onClick={navBtn(1)} style={{ background:'none', border:'none', cursor:'pointer', color:accent, fontSize:'20px', lineHeight:1, padding:'0 6px', fontWeight:300 }}>›</button>
      </div>

      {/* Day-of-week headers */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', padding:'6px 6px 2px', gap:'1px' }}>
        {(lang==='fr'?['Di','Lu','Ma','Me','Je','Ve','Sa']:lang==='es'?['Do','Lu','Ma','Mi','Ju','Vi','Sa']:lang==='yo'?['Àì','Aj','Ìṣẹ','Ọjọ́R','Ọjọ́B','Ẹt','Àb']:['Su','Mo','Tu','We','Th','Fr','Sa']).map(dw => (
          <div key={dw} style={{ textAlign:'center', fontSize:'8px', fontWeight:700, color:'var(--ylt-t4)', letterSpacing:'0.5px', textTransform:'uppercase' }}>{dw}</div>
        ))}
      </div>

      {/* Grid */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'2px', padding:'2px 6px 8px' }}>
        {Array.from({ length: firstDow }).map((_,i) => <div key={`e${i}`} />)}
        {days.map(({ d, orisha, moon, isToday, oIdx }) => (
          <button key={d} onClick={() => setSelDay(d)}
            style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'3px 1px', borderRadius:'8px', border: isToday ? `2px solid ${accent}` : selDay === d ? '1px solid rgba(196,169,106,0.55)' : '1px solid transparent', background: isToday ? 'rgba(196,169,106,0.16)' : selDay === d ? 'rgba(196,169,106,0.10)' : 'transparent', cursor:'pointer', transition:'all 0.15s', gap:'1px' }}>
            <span style={{ fontSize:'7px', lineHeight:1 }}>{moon}</span>
            <span style={{ fontSize:'10px', fontWeight: isToday ? 800 : 500, color: isToday ? accent : 'var(--ylt-t1)', lineHeight:1.1 }}>{d}</span>
            <span style={{ fontSize:'11px', lineHeight:1 }}>{orisha.icon}</span>
          </button>
        ))}
      </div>

      {/* Orisha legend */}
      <div style={{ display:'flex', justifyContent:'space-around', padding:'4px 8px 8px', borderTop:'1px solid rgba(196,169,106,0.10)', flexWrap:'wrap', gap:'4px' }}>
        {ORISHA.map((o, i) => (
          <div key={i} style={{ display:'flex', alignItems:'center', gap:'3px' }}>
            <span style={{ fontSize:'11px' }}>{o.icon}</span>
            <span style={{ fontSize:'8px', color:'var(--ylt-t4)', fontWeight:600 }}>{o.short.split(' ').pop()}</span>
          </div>
        ))}
      </div>

      {/* Selected day detail */}
      {sel && (
        <div style={{ margin:'0 8px 10px', padding:'12px 14px', borderRadius:'12px', background: isDark ? 'rgba(196,169,106,0.07)' : 'rgba(196,169,106,0.05)', border:'1px solid rgba(196,169,106,0.20)', animation:'fadeIn 0.2s ease' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'6px' }}>
            <span style={{ fontSize:'22px' }}>{sel.orisha.icon}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'14px', fontWeight:700, color:'var(--ylt-t1)', lineHeight:1.2 }}>{sel.orisha.name}</div>
              <div style={{ fontSize:'9px', color:'var(--ylt-t3)', marginTop:'1px' }}>
                {sel.date.toLocaleDateString(monthLocale, { weekday:'long', day:'numeric', month:'long', year:'numeric' })} · {sel.moon} {t.orishaCalLunarDay||'Lunar day'} {Math.round(sel.frac * 29.53) + 1}/29
              </div>
            </div>
          </div>
          <div style={{ fontSize:'10px', color:'var(--ylt-t3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.8px', marginBottom:'4px' }}>{t.orishaCalFocus||'Focus'}</div>
          <div style={{ fontSize:'11px', color:'var(--ylt-t2)', lineHeight:1.6, marginBottom:'6px' }}>{ph(sel.orisha,'focus',lang)}</div>
          <div style={{ fontSize:'10px', color:'var(--ylt-t3)', fontWeight:600, textTransform:'uppercase', letterSpacing:'0.8px', marginBottom:'4px' }}>{t.orishaCalGuidance||'Guidance'}</div>
          <div style={{ fontSize:'11px', color:'var(--ylt-t2)', lineHeight:1.6 }}>{ph(sel.orisha,'guidance',lang)}</div>
        </div>
      )}
    </div>
  );
}

      r.setProperty('--ylt-tab-c2',  '#5C4032');

      r.setProperty('--ylt-card-b2', 'rgba(139,115,85,0.10)');
      r.setProperty('--ylt-inp',     'rgba(255,255,255,0.80)');
      r.setProperty('--ylt-sel',     'rgba(253,248,240,0.97)');
      r.setProperty('--ylt-t1',      '#3D2B1F');
      r.setProperty('--ylt-t2',      '#5C4A32');
      r.setProperty('--ylt-t3',      '#8B7355');
      r.setProperty('--ylt-t4',      '#A89070');
      r.setProperty('--ylt-warn',    '#92400E');
      r.setProperty('--ylt-warm',    '#78350F');
      r.setProperty('--ylt-panel',   'rgba(61,43,31,0.04)');
      r.setProperty('--ylt-panel-b', 'rgba(61,43,31,0.10)');
      r.setProperty('--ylt-acc-btn', 'rgba(255,255,255,0.55)');
      r.setProperty('--ylt-acc-body','rgba(255,255,255,0.40)');
      r.setProperty('--ylt-mono',    'rgba(255,255,255,0.60)');
    }
  }, [isDark]);

  const TABS = [
    { k:'clock',   label:t.navAgogo || 'YLT',  icon:'🐓' },
    { k:'phases',  label:t.navPhases,  icon:'🌓' },
    { k:'orisha',  label:t.navOrisha,  icon:'🔮' },
    { k:'cosmos',  label:t.navCosmos || 'Ìràwò',  icon:'✨' },

    { k:'learn',   label:t.navLearn,   icon:'📚' },

  return (
    <div className="ylt-root" style={{ minHeight:'100dvh', background:'var(--ylt-bg)', fontFamily:"'DM Sans',sans-serif", color:'var(--ylt-t1)' }}>

    {/* ── AGOGO GREETING ── */}
    {showGreeting && (
      <AgogoChatGreeting
        yH={yH} yM={yM} phase={phase} isDark={isDark} moonPhase={moonPhase}

          setShowGreeting(false);
          setUserName(localStorage.getItem('ylt-user-name') || '');

    <div className="ylt-shell" style={{ background:'var(--ylt-bg)', minHeight:'100dvh' }}>

      {/* ── HEADER ── */}
      <header style={{ padding:'13px 18px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid var(--ylt-hdr-b)', background:'var(--ylt-hdr)', backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)', position:'sticky', top:0, zIndex:100 }}>
        <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
          <div style={{ width:'34px', height:'34px', borderRadius:'50%', background:'linear-gradient(135deg,#C4A96A,#8B7030)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px', boxShadow:'0 2px 8px rgba(139,112,48,0.3)' }}>🐓</div>
          <div>
            <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'17px', fontWeight:700, lineHeight:1.1 }}>Yorùbá Land Time</div>
            <div style={{ display:'flex', alignItems:'center', gap:'5px' }}>
              <span style={{ fontSize:'9px', color:'var(--ylt-t4)', letterSpacing:'2px', textTransform:'uppercase' }}>Agogo · Kojoda Tradition</span>
              <span style={{ display:'inline-flex', alignItems:'center', padding:'1px 7px', borderRadius:'8px', background:'rgba(196,169,106,0.18)', border:'1px solid rgba(196,169,106,0.38)', color:'#C4A96A', fontWeight:700, fontSize:'8px', letterSpacing:'1px', textTransform:'uppercase' }}>Beta Version</span>
            </div>
            {userName && (
              <div style={{ fontSize:'9px', color:'#C4A96A', marginTop:'1px', fontStyle:'italic' }}>

              </div>

          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
          <div style={{ textAlign:'right' }}>
            <div style={{ fontSize:'9px', color:'var(--ylt-t4)', textTransform:'uppercase', letterSpacing:'1px' }}>
              {orisha.name}

            <div style={{ fontSize:'11px', color:'var(--ylt-t2)' }}>{yorubaDayStr}</div>
          </div>
          <span style={{ fontSize:'16px' }}>{orisha.icon}</span>
        </div>
      </header>

      {/* ── BODY ── */}
      <div className="ylt-body" style={{ padding:'16px 16px 48px', maxWidth:'480px', margin:'0 auto', width:'100%' }}>

        {/* Top control bar: location left · language right */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'10px', gap:'8px' }}>
          {/* Compact location pill */}
          <div style={{ position:'relative', flexShrink:0 }}>
            {/* Visible styled pill */}
            <div style={{ display:'flex', alignItems:'center', gap:'5px', padding:'3px 22px 3px 9px', borderRadius:'20px', border:'1px solid rgba(196,169,106,0.45)', background:'rgba(196,169,106,0.13)', fontSize:'10px', fontWeight:600, color:'#C4A96A', whiteSpace:'nowrap', pointerEvents:'none', userSelect:'none' }}>
              <span style={{ fontSize:'12px' }}>
                {selectedCity === 'gps' ? '📍' : (CITIES.find(c => c.key === selectedCity)?.flag || '🇳🇬')}
              </span>
              <span>
                {selectedCity === 'gps' ? 'GPS' : (CITIES.find(c => c.key === selectedCity)?.name?.split(',')[0] || 'Ilé Ifè')}
              </span>
              <span style={{ fontSize:'8px', opacity:0.7, marginLeft:'1px' }}>▾</span>
            </div>
            {/* Transparent native select — handles all interaction */}
            <select
              value={selectedCity}
              onChange={e => { const v = e.target.value; if(v==='gps') handleGPS(); else handleCityChange(v); }}

              <option value="gps">📍 GPS</option>

            </select>
          </div>
          {/* Right cluster: language */}
          <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
            {/* Language pills */}
            {Object.values(LANGS).map(l => (
              <button key={l.code} onClick={() => saveLang(l.code)} style={{ padding:'3px 9px', borderRadius:'20px', border:`1px solid ${lang===l.code?'#C4A96A':'rgba(139,115,85,0.22)'}`, background: lang===l.code?'rgba(196,169,106,0.18)':'transparent', color: lang===l.code?'var(--ylt-t1)':'var(--ylt-t3)', fontSize:'10px', fontWeight: lang===l.code?700:500, cursor:'pointer', transition:'all 0.2s', letterSpacing:'0.5px' }}>{l.label}</button>
            ))}
          </div>
        </div>

        {/* Tab bar */}
        <div style={{ display:'flex', gap:'4px', marginBottom:'18px', background:'var(--ylt-tabs)', borderRadius:'14px', padding:'5px', border:`1px solid ${isDark ? 'rgba(196,169,106,0.32)' : 'rgba(139,115,85,0.22)'}`, boxShadow:'inset 0 1px 3px rgba(0,0,0,0.12)' }}>

                "{phase.greeting}" <span style={{ fontSize:'12px', color:'var(--ylt-t3)' }}>({lang==='en'?phase.greetingEn:lang==='fr'?phase.greetingFr:lang==='es'?phase.greetingEs:phase.greetingEn})</span>
              </div>
            </div>

            {/* Clock face + digital readout */}
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'12px' }}>
              <div style={{ width:'100%', display:'flex', justifyContent:'center' }}>
                <AnalogClock yH={yH} yM={yM} yS={yS} color={phase.color} moonFrac={getMoonPhase(new Date(), dawnSecs).fracPhase} />
              </div>
              <div style={{ textAlign:'center', padding:'16px 20px', borderRadius:'16px', background: isDark ? 'rgba(196,169,106,0.06)' : 'rgba(255,255,255,0.7)', border:'1px solid rgba(196,169,106,0.18)', backdropFilter:'blur(8px)' }}>

                {/* ── Big time + phase label ── */}
                <div style={{ display:'flex', alignItems:'baseline', justifyContent:'center', gap:'10px', marginBottom:'2px' }}>
                  <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'54px', fontWeight:700, color:'var(--ylt-t1)', letterSpacing:'2px', lineHeight:1 }}>
                    {fmt2(yH)}:{fmt2(yM)}
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-start', gap:'3px', paddingBottom:'8px' }}>
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'13px', fontWeight:700, color: yH<=8 ? '#D97706' : (isDark ? '#A5B4FC' : '#6366F1'), letterSpacing:'2px', lineHeight:1 }}>
                      {yH <= 8 ? 'OJÓ' : 'ALẸ́'}
                    </div>
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'11px', color:'var(--ylt-t3)', letterSpacing:'0.5px', lineHeight:1, fontStyle:'italic' }}>
                      {YLT_SPOKEN_NAMES[yH - 1]}
                    </div>
                  </div>
                </div>

                {/* ── Spoken time ── */}
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'13px', color:'#C4A96A', fontStyle:'italic', opacity:0.88, marginBottom:'12px' }}>
                  "{yltSpokenTime(yH, yM)}"
                </div>

                {/* ── Divider ── */}
                <div style={{ height:'1px', background:'linear-gradient(90deg,transparent,rgba(196,169,106,0.3),transparent)', marginBottom:'12px' }} />

                {/* ── Secondary info rows ── */}
                <div style={{ display:'flex', flexDirection:'column', gap:'5px' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <span style={{ fontSize:'10px', color:'var(--ylt-t4)', letterSpacing:'1.5px', textTransform:'uppercase' }}>YLT Half</span>
                    <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'13px', color: yH<=8 ? '#D97706' : (isDark ? '#A5B4FC' : '#6366F1'), fontWeight:600 }}>
                      {yH <= 8 ? 'OJÓ' : 'ALẸ́'} · {yH <= 8 ? fmt2(yH) : fmt2(yH - 8)}:{fmt2(yM)}

                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <span style={{ fontSize:'10px', color:'var(--ylt-t4)', letterSpacing:'1.5px', textTransform:'uppercase' }}>{t.watLabel}</span>
                    <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'13px', color:'var(--ylt-t2)', fontWeight:600 }}>{fmtStdFull(now)}</span>
                  </div>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                    <span style={{ fontSize:'10px', color:'var(--ylt-t4)', letterSpacing:'1.5px', textTransform:'uppercase' }}>{t.gregorianLabel}</span>
                    <span style={{ fontSize:'12px', color:'var(--ylt-t2)', fontWeight:600 }}>{gregDateStr}</span>
                  </div>
                  {beforeDawn && (
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                      <span style={{ fontSize:'10px', color:'var(--ylt-t4)', letterSpacing:'1.5px', textTransform:'uppercase' }}>{t.yorubaDateLabel}</span>
                      <span style={{ fontSize:'12px', color:'#C4A96A', fontWeight:600 }}>{yorubaDayStr}</span>
                    </div>
                  )}
                </div>
              </div>
            </div>{/* end clock wrapper */}
            <div style={{ display:'flex', justifyContent:'center' }}>
              <button
                onClick={() => setNotifOpen(o => !o)}
                style={{ display:'flex', alignItems:'center', gap:'5px', padding:'6px 16px', borderRadius:'20px', border:`1px solid ${notifOpen ? '#C4A96A' : 'rgba(196,169,106,0.38)'}`, background: notifOpen ? 'rgba(196,169,106,0.18)' : 'rgba(196,169,106,0.08)', color:'#C4A96A', fontSize:'11px', fontWeight:600, cursor:'pointer', letterSpacing:'0.4px', whiteSpace:'nowrap', transition:'all 0.2s' }}
              >
                🔔 <span>{t.setNotif}</span>
              </button>

            {notifOpen && (
              <div style={{ animation:'slideUp 0.2s ease' }}>
                <YLTNotifications yH={yH} yM={yM} open={notifOpen} setOpen={setNotifOpen} t={t} />

            {/* 16-Hour Day Scale */}
            <div style={{ paddingTop:'4px' }}>
              <DayScale yH={yH} yM={yM} phase={phase} isDark={isDark} />
            </div>

            {/* Cock Crow card */}
            <div style={{ padding:'12px 14px', borderRadius:'12px', background:'linear-gradient(135deg,rgba(245,158,11,0.08),rgba(196,169,106,0.05))', border:'1px solid rgba(245,158,11,0.22)', display:'flex', alignItems:'center', gap:'12px' }}>

                <div style={{ fontSize:'10px', color:'var(--ylt-t4)' }}>{t.inEta} {nextCrow.eta}</div>

            {/* ── DIVIDER ── */}
            <div style={{ height:'1px', background:'linear-gradient(90deg,transparent,rgba(196,169,106,0.3),transparent)', margin:'2px 0' }} />

            {/* 16 Hours Declaration */}
            <div style={{ textAlign:'center', padding:'22px 18px 20px', borderRadius:'20px', background:'linear-gradient(135deg,rgba(196,169,106,0.16),rgba(196,169,106,0.04))', border:'1px solid rgba(196,169,106,0.38)', position:'relative', overflow:'hidden' }}>
              <div style={{ position:'absolute', top:0, left:0, right:0, height:'3px', background:'linear-gradient(90deg,transparent,#C4A96A,transparent)' }}></div>
              <div style={{ fontSize:'10px', color:'rgba(196,169,106,0.75)', textTransform:'uppercase', letterSpacing:'3.5px', fontWeight:700, marginBottom:'10px' }}>{t.hoursInDay}</div>

              <div style={{ fontSize:'12px', color:'var(--ylt-t3)', lineHeight:1.75, maxWidth:'270px', margin:'0 auto' }}>
                {t.hoursDesc}
              </div>
            </div>

            {/* 3 core declarations */}
            <div style={{ display:'flex', flexDirection:'column', gap:'10px', width:'100%' }}>
              {[
                { num:'16', label:t.decl16hLabel, detail:t.decl16hDetail, accent:'#C4A96A' },
                { num:'60 · 90', label:t.decl6090Label, detail:t.decl6090Detail, accent:'#B89A50' },
                { num:'86,400', label:t.decl86400Label, detail:t.decl86400Detail, accent:'#C4A96A' },
              ].map(({ num, label, detail, accent }, i) => (

                  <div style={{ width:'4px', alignSelf:'stretch', background:`linear-gradient(180deg,${accent},${accent}88)`, flexShrink:0 }}></div>
                  <div style={{ padding:'14px 16px', borderRight:'1px solid rgba(196,169,106,0.15)', flexShrink:0, minWidth:'80px', textAlign:'center', background: isDark ? 'rgba(196,169,106,0.06)' : 'rgba(196,169,106,0.04)' }}>
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize: num.length > 4 ? '22px' : '32px', fontWeight:700, color:accent, lineHeight:1, letterSpacing: num.length > 4 ? '1px' : '-0.5px' }}>{num}</div>

            <YLTWidget yH={yH} yM={yM} yS={yS} phase={phase} orisha={orisha} dawnSecs={dawnSecs} isDark={isDark} />

          </div>
        )}

        {/* ── TAB: PHASES ── */}
        {tab === 'phases' && (
          <div style={{ display:'flex', flexDirection:'column', gap:'14px', animation:'slideUp 0.3s ease' }}>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'22px', fontWeight:700, color:'var(--ylt-t1)' }}>{t.phasesTitle}</div>
              <div style={{ fontSize:'12px', color:'var(--ylt-t3)', fontStyle:'italic' }}>{t.phasesSubtitle}</div>

            <PhaseTimeline currentIdx={phaseIdx} dawnSecs={dawnSecs} lang={lang} t={t} isDark={isDark} />
            <div style={{ padding:'18px', borderRadius:'16px', background: isDark ? `linear-gradient(135deg,${phase.color}28,${phase.color}0C)` : `linear-gradient(135deg,${phase.light},white)`, border:`2px solid ${phase.color}${isDark?'55':'38'}` }}>
              <div style={{ fontSize:'10px', textTransform:'uppercase', letterSpacing:'1px', color:phase.color, fontWeight:700, marginBottom:'6px' }}>{t.phaseNow} — {phase.yoruba}</div>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'17px', fontWeight:700, color:'var(--ylt-t1)', marginBottom:'6px' }}>{phase.icon} {ph(phase,'meaning',lang)}</div>
              <div style={{ fontSize:'13px', color:'var(--ylt-t2)', lineHeight:1.65, marginBottom:'10px' }}>{ph(phase,'energy',lang)}</div>
              <div style={{ fontSize:'10px', textTransform:'uppercase', letterSpacing:'1px', color:'var(--ylt-t3)', fontWeight:600, marginBottom:'6px' }}>{t.optimalActs}</div>

                <div key={i} style={{ fontSize:'13px', color:'var(--ylt-t2)', padding:'3px 0', display:'flex', alignItems:'center', gap:'8px' }}>
                  <div style={{ width:'5px', height:'5px', borderRadius:'50%', background:phase.color, flexShrink:0 }} />{a}
                </div>

            </div>
          </div>

        {/* ── TAB: ORISHA ── */}
        {tab === 'orisha' && (
          <div style={{ display:'flex', flexDirection:'column', gap:'14px', animation:'slideUp 0.3s ease' }}>

            {/* Header */}
            <div style={{ textAlign:'center' }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'24px', fontWeight:700, color:'var(--ylt-t1)' }}>{t.orishaTitle}</div>
              <div style={{ fontSize:'12px', color:'var(--ylt-t3)', fontStyle:'italic' }}>{t.orishaSubtitle}</div>
            </div>

            {/* Ọrísà Overview */}
            <div style={{ padding:'16px 18px', borderRadius:'16px', background: isDark ? 'linear-gradient(135deg,rgba(124,58,237,0.12),rgba(124,58,237,0.04))' : 'linear-gradient(135deg,rgba(124,58,237,0.06),rgba(255,255,255,0.6))', border:'1px solid rgba(124,58,237,0.22)' }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'17px', fontWeight:700, color:'#7C3AED', marginBottom:'8px' }}>{t.orishaWhoTitle||'Who Are the Ọrísà?'}</div>
              <div style={{ fontSize:'12.5px', color:'var(--ylt-t2)', lineHeight:1.75 }}>
                {t.orishaWhoP1||'The word Ọrísà carries a precise meaning: one chosen by Orí for a sacred purpose, or one who has so distinguished themselves among mortals that they have crossed the threshold into the realm of the deified. The Ọrísà are not lesser gods, diminished subsidiaries of a distant supreme being. They are living principles, cosmological forces given personal form. Each governs a domain of existence — iron, wisdom, purity, the ocean, lightning, the crossroads — and each offers a relationship, not merely reverence.'}
              </div>
              <div style={{ fontSize:'12.5px', color:'var(--ylt-t2)', lineHeight:1.75, marginTop:'10px' }}>
                {t.orishaWhoP2||'The 4-day Ọrísà week is not arbitrary. It maps the arc of creation itself: purification, knowledge, action, and return. Every four days the cycle completes and begins again, offering the practitioner a rhythmic framework for living in alignment with cosmic law.'}
              </div>
            </div>

            {/* Orisha Day Alerts — prominent placement */}
            <div style={{ borderRadius:'16px', overflow:'hidden', border:'2px solid rgba(196,169,106,0.45)', background: isDark ? 'linear-gradient(135deg,rgba(196,169,106,0.12),rgba(196,169,106,0.04))' : 'linear-gradient(135deg,rgba(196,169,106,0.10),rgba(255,255,255,0.7))' }}>
              <div style={{ padding:'14px 16px', display:'flex', alignItems:'center', gap:'12px' }}>
                <div style={{ fontSize:'24px', flexShrink:0 }}>🔔</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'16px', fontWeight:700, color:'var(--ylt-t1)', marginBottom:'2px' }}>{t.orishaAlertsTitle||'Ọrísà Day Alerts'}</div>
                  <div style={{ fontSize:'11px', color:'var(--ylt-t3)', lineHeight:1.5 }}>{t.orishaAlertsDesc||'Receive sacred insights, affirmations and guidance at the dawn of each Ọrísà day, delivered directly to your inbox.'}</div>
                </div>
                <button onClick={() => setOrishaSubsOpen(o => !o)}
                  style={{ display:'flex', alignItems:'center', gap:'4px', padding:'7px 14px', borderRadius:'20px', border:`1px solid ${orishaSubsOpen ? '#C4A96A' : 'rgba(196,169,106,0.5)'}`, background: orishaSubsOpen ? 'linear-gradient(135deg,#C4A96A,#A8893C)' : 'rgba(196,169,106,0.15)', color: orishaSubsOpen ? '#2D1A08' : '#C4A96A', fontSize:'11px', fontWeight:700, cursor:'pointer', whiteSpace:'nowrap', flexShrink:0, transition:'all 0.2s' }}>
                  {orishaSubsOpen ? (t.orishaAlertsActive||'✓ Active') : (t.orishaAlertsSubscribe||'Subscribe')}
                </button>
              </div>
              {orishaSubsOpen && (
                <div style={{ borderTop:'1px solid rgba(196,169,106,0.20)' }}>
                  <OrishaSubscriptions orishaIdx={orishaIdx} open={orishaSubsOpen} setOpen={setOrishaSubsOpen} t={t} />
                </div>
              )}
            </div>

            {/* Interactive Orisha Calendar — immediately after Alerts */}
            <OrishaCalendar dawnSecs={dawnSecs} isDark={isDark} t={t} lang={lang} />

            {/* Today's Orisha Day */}
            <OrishaDayCard idx={orishaIdx} lang={lang} t={t} alertsOpen={false} onAlertsToggle={null} />

            {/* Provisional notice */}
            <div style={{ textAlign:'center', fontSize:'11px', color:'#7C3AED', padding:'4px 0' }}>{t.orishaProvisional}</div>

            {/* Other Orisha days */}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'8px' }}>
              {ORISHA.filter((_,i) => i !== orishaIdx).map((d,i) => (
                <div key={i} style={{ padding:'12px 8px', borderRadius:'12px', background:'var(--ylt-card-lo)', border:'1px solid var(--ylt-card-b2)', textAlign:'center' }}>
                  <div style={{ fontSize:'20px', marginBottom:'5px' }}>{d.icon}</div>
                  <div style={{ fontFamily:"'Cormorant Garamond',serif", fontWeight:700, fontSize:'12px', color:'var(--ylt-t1)', marginBottom:'3px' }}>{d.short}</div>
                  <div style={{ fontSize:'10px', color:'var(--ylt-t3)', fontStyle:'italic', marginBottom:'3px' }}>{ph(d,'meaning',lang)}</div>
                  <div style={{ fontSize:'9.5px', color:'var(--ylt-t4)', lineHeight:1.4 }}>{ph(d,'focus',lang)}</div>
                </div>
              ))}
            </div>

          </div>
        )}

        {/* ── TAB: COSMOS ── */}
        {tab === 'cosmos' && (
          <DogonCosmos isDark={isDark} t={t} />
        )}

        {/* ── TAB: CONVERT ── */}
        {tab === 'convert' && (
          <div style={{ display:'flex', flexDirection:'column', gap:'14px', animation:'slideUp 0.3s ease' }}>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'22px', fontWeight:700, color:'var(--ylt-t1)' }}>{t.convertTitle}</div>
              <div style={{ fontSize:'12px', color:'var(--ylt-t3)', fontStyle:'italic' }}>{t.convertSubtitle}</div>
            </div>
            <TimeConverter dawnSecs={dawnSecs} t={t} />
            <QuickReference dawnSecs={dawnSecs} t={t} />
          </div>
        )}

        {/* ── TAB: LEARN ── */}
        {tab === 'learn' && (
          <div style={{ display:'flex', flexDirection:'column', gap:'14px', animation:'slideUp 0.3s ease' }}>
            <div style={{ textAlign:'center' }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'22px', fontWeight:700, color:'var(--ylt-t1)' }}>{t.learnTitle}</div>
              <div style={{ fontSize:'12px', color:'var(--ylt-t3)', fontStyle:'italic' }}>{t.learnSubtitle}</div>
            </div>

            {/* ── ABOUT YLT ── */}
            <div style={{ borderRadius:'20px', overflow:'hidden', border:'1px solid rgba(196,169,106,0.28)' }}>
              {/* Gold header bar */}
              <div style={{ background:'linear-gradient(135deg,#3A2410,#2A1A0C)', padding:'22px 20px 18px', borderBottom:'1px solid rgba(196,169,106,0.2)' }}>
                <div style={{ fontSize:'10px', color:'rgba(196,169,106,0.7)', textTransform:'uppercase', letterSpacing:'3px', fontWeight:600, marginBottom:'8px' }}>{t.learnAboutLabel||'About This Project'}</div>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'28px', fontWeight:700, color:'#C4A96A', lineHeight:1.15, marginBottom:'6px' }}>
                  {t.learnHeadline||'Time Is Not Neutral'}
                </div>
                <div style={{ fontSize:'13px', color:'rgba(255,255,255,0.55)', fontStyle:'italic', lineHeight:1.6 }}>
                  {t.learnTagline||'Every clock carries the cultural fingerprint of its creators.'}
                </div>
              </div>

              {/* Body */}
              <div style={{ background:'var(--ylt-card)', padding:'20px' }}>
                <div style={{ fontSize:'13.5px', color:'var(--ylt-t2)', lineHeight:1.8, marginBottom:'16px' }}>
                  {t.learnP1||'The world runs on a grid designed far from the equator, calibrated to a rhythm that has no organic connection to Afrikan life. Midnight as the pivot of the day. Seven days inherited from Roman planetary gods. A temporal architecture imposed, not grown.'}
                </div>

                <div style={{ fontSize:'13.5px', color:'var(--ylt-t2)', lineHeight:1.8, marginBottom:'16px' }}>
                  {t.learnP2||"Yorùbá Land Time returns the clock to where it belongs: the dawn. Following the Kojoda timekeeping tradition, one of humanity's oldest continuous frameworks for reading the relationship between sun, moon, and daily life, YLT restructures the day from its natural beginning. When the rooster crows and light breaks the horizon, a new day is born. Not before. Not at some arbitrary stroke of midnight in the dark."}
                </div>

                <div style={{ fontSize:'13.5px', color:'var(--ylt-t2)', lineHeight:1.8, marginBottom:'20px' }}>
                  {t.learnP3||'The mathematics are elegant. Sixteen hours. Ninety seconds per minute. Sixty minutes per hour. The total? 86,400 seconds, identical to the standard day. Nothing is lost. Everything is reoriented. YLT is not an alternative to modern time. It is modern time, refracted through a lens that is finally, unapologetically yours.'}
                </div>

                {/* Pull quote */}
                <div style={{ borderLeft:'3px solid #C4A96A', paddingLeft:'16px', marginBottom:'20px', background:'rgba(196,169,106,0.06)', borderRadius:'0 10px 10px 0', padding:'14px 14px 14px 18px' }}>
                  <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'17px', fontStyle:'italic', color:'var(--ylt-t1)', lineHeight:1.6 }}>
                    {t.learnPullQuote||'"This is not nostalgia. It is reclamation. Time told in the language of your ancestors. Time that knows when Ọ̀run touches Ayé. Time that belongs to you."'}
                  </div>
                </div>

                {/* Tradition & authorship */}
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'16px' }}>
                  {[
                    ['🌅', t.learnRootedIn||'Rooted In', 'Kojoda Timekeeping Tradition'],
                    ['🏛',  t.learnGuidedBy||'Guided By', 'Ìgbìmò Kójódá, YLT Traditional Council'],
                    ['✍🏾', t.learnConceivedBy||'Conceived By', 'Oni Olufemi · Afonrere'],
                    ['🌍', t.learnFor||'For', 'All who honour the sun, moon and stars as sacred time pieces'],
                  ].map(([icon,label,val],i) => (
                    <div key={i} style={{ padding:'12px', borderRadius:'12px', background:'var(--ylt-panel)', border:'1px solid var(--ylt-panel-b)' }}>
                      <div style={{ fontSize:'18px', marginBottom:'5px' }}>{icon}</div>
                      <div style={{ fontSize:'9px', textTransform:'uppercase', letterSpacing:'1px', color:'var(--ylt-t4)', fontWeight:600, marginBottom:'3px' }}>{label}</div>
                      <div style={{ fontSize:'11px', color:'var(--ylt-t2)', fontWeight:600, lineHeight:1.4 }}>{val}</div>
                    </div>
                  ))}
                </div>

                {/* Research Support */}
                <div style={{ padding:'12px 14px', borderRadius:'12px', background:'rgba(196,169,106,0.07)', border:'1px solid rgba(196,169,106,0.18)', display:'flex', alignItems:'center', gap:'12px' }}>
                  <div style={{ fontSize:'20px', flexShrink:0 }}>🔬</div>
                  <div>
                    <div style={{ fontSize:'9px', textTransform:'uppercase', letterSpacing:'1.2px', color:'var(--ylt-t4)', fontWeight:700, marginBottom:'2px' }}>{t.learnResearchRole||'Ọrísà Calendar Research Support Analyst'}</div>
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'14px', fontWeight:700, color:'var(--ylt-t1)' }}>Mide Oyekale</div>
                    <div style={{ fontSize:'10px', color:'var(--ylt-t3)', fontStyle:'italic', marginTop:'1px' }}>ATOKA Foundation</div>
                  </div>
                </div>
              </div>
            </div>

            {/* Afonrere Pull Quote */}
            <div style={{ borderRadius:'20px', overflow:'hidden', border:`1px solid ${isDark ? 'rgba(196,169,106,0.38)' : 'rgba(196,169,106,0.30)'}`, background: isDark ? 'linear-gradient(160deg,#2A1A0C 0%,#1A0D04 100%)' : 'linear-gradient(160deg,rgba(196,169,106,0.10),rgba(196,169,106,0.03))', position:'relative' }}>
              <div style={{ position:'absolute', top:0, left:0, right:0, height:'3px', background:'linear-gradient(90deg,transparent,#C4A96A,transparent)' }}></div>
              <div style={{ padding:'30px 26px 24px' }}>
                <div style={{ fontSize:'40px', color:'rgba(196,169,106,0.35)', fontFamily:"'Cormorant Garamond',serif", lineHeight:1, marginBottom:'8px', marginLeft:'-4px' }}>"</div>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'22px', fontWeight:700, color: isDark ? '#D4B97A' : '#3D2B1F', lineHeight:1.55, fontStyle:'italic', marginTop:'-18px' }}>
                  {(t.learnAfonquote||'"He who determines how you measure time, determines your life, because time is life."').replace(/^"|"$/g,'')}
                </div>
                <div style={{ marginTop:'20px', display:'flex', alignItems:'center', gap:'12px' }}>
                  <div style={{ width:'36px', height:'1px', background:'rgba(196,169,106,0.5)', flexShrink:0 }}></div>
                  <div>
                    <div style={{ fontSize:'13px', fontWeight:700, color:'#C4A96A', letterSpacing:'0.5px' }}>Afonrere</div>
                    <div style={{ fontSize:'10px', color: isDark ? 'rgba(196,169,106,0.55)' : 'var(--ylt-t4)', marginTop:'2px', letterSpacing:'1px', textTransform:'uppercase' }}>Yorùbá Land Time</div>
                  </div>
                </div>
              </div>
            </div>

            {/* Math */}
            <div style={{ background:'var(--ylt-card)', borderRadius:'16px', padding:'20px', border:'1px solid var(--ylt-card-b)' }}>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', marginBottom:'12px' }}>
                {[[t.stdTime||'Standard','24 × 60 × 60'],['YLT','16 × 60 × 90']].map(([lbl,eq],i) => (
                  <div key={i} style={{ padding:'14px', borderRadius:'12px', background: i===0 ? 'rgba(196,169,106,0.08)' : 'var(--ylt-panel)', border:`1px solid ${i===0?'rgba(196,169,106,0.22)':'var(--ylt-panel-b)'}` }}>
                    <div style={{ fontSize:'10px', textTransform:'uppercase', letterSpacing:'1px', color:'var(--ylt-t3)', marginBottom:'6px', fontWeight:600 }}>{lbl}</div>
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'15px', fontWeight:700, color:'var(--ylt-t1)' }}>{eq}</div>
                    <div style={{ fontSize:'20px', fontWeight:700, color:'#C4A96A', marginTop:'4px' }}>= 86,400 s</div>
                  </div>
                ))}
              </div>
              <div style={{ textAlign:'center', fontSize:'13px', color:'var(--ylt-t2)', fontStyle:'italic' }}>{t.sameDuration}</div>
            </div>

            {/* Core Principles */}
            <div style={{ background:'var(--ylt-card)', borderRadius:'16px', padding:'20px', border:'1px solid var(--ylt-card-b)' }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'18px', fontWeight:700, color:'var(--ylt-t1)', marginBottom:'14px' }}>{t.corePrinciples}</div>
              {[
                [t.learnPrinciple1Title||'Òwúrọ̀ ni ọjọ́', t.learnPrinciple1Body||'The day begins at dawn, not midnight. Your clock should honour when life actually begins.'],
                [t.learnPrinciple2Title||'16-Hour Wisdom', t.learnPrinciple2Body||'Sixteen hours with 90-second minutes creates a more natural structure. Fewer, longer hours reduce the psychological fragmentation of time.'],
                [t.learnPrinciple3Title||'Dawn to Dawn', t.learnPrinciple3Body||'A complete YLT day runs from one sunrise to the next, honouring the natural cycle your body already recognises.'],
                [t.learnPrinciple4Title||'Perfect Compatibility', t.learnPrinciple4Body||'86,400 seconds in both systems means seamless conversion. You lose nothing and gain cultural alignment.'],
                [t.learnPrinciple5Title||'4-Day Cycle', t.learnPrinciple5Body||'The Ọrísà week replaces the arbitrary 7-day structure with a 4-day rhythm, providing more frequent renewal and recovery.'],
              ].map(([pt,pd],i,a) => (
                <div key={i} style={{ marginBottom: i<a.length-1 ? '14px' : 0, paddingBottom: i<a.length-1 ? '14px' : 0, borderBottom: i<a.length-1 ? '1px solid rgba(139,115,85,0.08)' : 'none' }}>
                  <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'15px', fontWeight:700, color:'#C4A96A', marginBottom:'4px' }}>{pt}</div>
                  <div style={{ fontSize:'13px', color:'var(--ylt-t2)', lineHeight:1.65 }}>{pd}</div>
                </div>
              ))}
            </div>

            {/* Formulas */}
            <div style={{ background:'var(--ylt-panel)', borderRadius:'16px', padding:'20px', border:'1px solid var(--ylt-panel-b)' }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'18px', fontWeight:700, color:'var(--ylt-t1)', marginBottom:'14px' }}>{t.formulasTitle}</div>
              {[
                [t.stdFormula || 'Standard → YLT','YLT Hour = ((Std Hour − 6) × ²⁄₃) + 1'],
                [t.yltFormula || 'YLT → Standard','Std Hour = ((YLT Hour − 1) × 1.5) + 6'],
              ].map(([lbl,form],i) => (
                <div key={i} style={{ marginBottom: i===0 ? '14px' : 0 }}>
                  <div style={{ fontSize:'11px', fontWeight:700, color:'var(--ylt-t3)', textTransform:'uppercase', letterSpacing:'1px', marginBottom:'6px' }}>{lbl}</div>
                  <div style={{ fontFamily:'monospace', fontSize:'13px', color:'var(--ylt-t2)', background:'var(--ylt-mono)', padding:'10px 14px', borderRadius:'8px' }}>{form}</div>
                </div>
              ))}
            </div>

            {/* Pronunciation */}
            <div style={{ background:'var(--ylt-card)', borderRadius:'16px', padding:'20px', border:'1px solid var(--ylt-card-b)' }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'18px', fontWeight:700, color:'var(--ylt-t1)', marginBottom:'14px' }}>{t.pronunciationTitle}</div>
              {[
                ['Yorùbá','yo-roo-BAH'],['Kojoda','ko-JO-da'],['Àṣẹ','ah-SHAY'],
                ['Ojúmọ́','oh-JU-mo'],['Òwúrọ̀','OH-wu-ro'],['Ìyálẹ̀ta','ee-YAH-lay-ta'],
                ['Òsán','OH-sahn'],['Ìròlẹ́','ee-ro-LAY'],['Alẹ́','ah-LAY'],
                ['Òru','OH-ru'],['Àfẹ̀mọ́jumọ́','ah-fay-mo-ju-mo'],
              ].map(([w,p],i,a) => (
                <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'7px 0', borderBottom: i<a.length-1 ? '1px solid rgba(139,115,85,0.08)' : 'none' }}>
                  <span style={{ fontFamily:"'Cormorant Garamond',serif", fontWeight:700, fontSize:'15px', color:'var(--ylt-t1)' }}>{w}</span>
                  <span style={{ fontFamily:'monospace', fontSize:'12px', color:'var(--ylt-t3)', background:'rgba(196,169,106,0.1)', padding:'2px 8px', borderRadius:'4px' }}>{p}</span>
                </div>
              ))}
            </div>

            {/* About & Contact */}
            <div style={{ background:'linear-gradient(135deg,var(--ylt-panel),rgba(196,169,106,0.06))', borderRadius:'16px', padding:'20px', border:'1px solid var(--ylt-card-b)' }}>
              <div style={{ background:'rgba(196,169,106,0.1)', borderRadius:'10px', padding:'12px 14px', borderLeft:'3px solid #C4A96A', marginBottom:'14px' }}>
                <div style={{ fontSize:'10px', color:'var(--ylt-t3)', textTransform:'uppercase', letterSpacing:'1.2px', fontWeight:700, marginBottom:'4px' }}>{t.learnConceptVision||'Concept & Vision'}</div>
                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'16px', fontWeight:700, color:'var(--ylt-t1)' }}>Oni Olufemi</div>
                <div style={{ fontSize:'12px', color:'var(--ylt-t3)', fontStyle:'italic' }}>{t.learnAfonrereRole||'known as Afonrere · Conceptor of Yorùbá Land Time'}</div>
              </div>
              <div style={{ fontSize:'10px', color:'var(--ylt-t3)', textTransform:'uppercase', letterSpacing:'1px', fontWeight:600, marginBottom:'8px' }}>{t.contactLabel}</div>
              {[
                [t.contactGeneral,'yorubalandtime@gmail.com'],
              ].map(([l,e],i,a) => (
                <div key={i} style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', padding:'6px 0', borderBottom: i<a.length-1 ? '1px solid rgba(139,115,85,0.08)' : 'none' }}>
                  <span style={{ color:'var(--ylt-t3)' }}>{l}</span>
                  <a href={`mailto:${e}`} style={{ color:'#C4A96A', textDecoration:'none' }}>{e}</a>
                </div>
              ))}

              {/* Subscribe CTA */}
              <div style={{ marginTop:'14px', textAlign:'center' }}>
                <div style={{ fontSize:'11px', color:'var(--ylt-t3)', marginBottom:'8px' }}>{t.subscribeUpdates}</div>
                <a
                  href="mailto:yorubalandtime@gmail.com?subject=Subscribe%20to%20YLT%20Updates&body=Please%20add%20me%20to%20the%20YLT%20newsletter.%0A%0AName%3A%0ACity%3A"
                  style={{ display:'inline-flex', alignItems:'center', gap:'6px', padding:'10px 22px', borderRadius:'24px', background:'linear-gradient(135deg,#C4A96A,#A8893C)', color:'white', fontSize:'12px', fontWeight:700, textDecoration:'none', letterSpacing:'0.8px', boxShadow:'0 2px 10px rgba(168,137,60,0.35)' }}
                >
                  {t.subscribeBtn}
                </a>
              </div>
            </div>

            {/* Calendar Note — open quagmire acknowledgment */}
            <CalendarNote t={t} />
          </div>
        )}

        {/* ── TAB: AGENT ── */}
        {tab === 'agent' && (
          <YLTAgent
            yH={yH} yM={yM}
            phase={phase}
            orisha={orisha}
            isDark={isDark}
            lang={lang}
            t={t}
          />
        )}
      </div>

      {/* ── FOOTER ── */}
      <footer style={{ padding:'18px', textAlign:'center', borderTop:'1px solid var(--ylt-ftr-b)', background:'var(--ylt-ftr)' }}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'16px', fontWeight:700, color:'var(--ylt-t1)', marginBottom:'4px' }}>"Òwúrọ̀ ni ọjọ́"</div>
        <div style={{ fontSize:'12px', color:'var(--ylt-t3)', fontStyle:'italic', marginBottom:'10px' }}>{t.footerQuoteTrans}</div>
        <div style={{ height:'1px', background:'var(--ylt-ftr-b)', marginBottom:'10px' }} />
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'13px', fontWeight:600, color:'var(--ylt-t2)', marginBottom:'2px' }}>
          "Ilé Ifè ní ibi ti ojúmó ti ń mó wá"
        </div>
        <div style={{ fontSize:'10.5px', color:'var(--ylt-t3)', fontStyle:'italic', marginBottom:'10px' }}>
          Ilé Ifè is where the morning light first comes from
        </div>
        <div style={{ fontSize:'10px', color:'var(--ylt-t4)' }}>Yorùbá Land Time (YLT) · Rooted in the Kojoda Tradition</div>

        <div style={{ fontSize:'13px', color:'#C4A96A', marginTop:'4px' }}>Àṣẹ!</div>
      </footer>

    </div>{/* end ylt-shell */}

      {/* ── INSTALL OVERLAYS — rendered outside shell so they overlay full viewport ── */}
      {showInstall  && <InstallBanner onInstall={handleInstall} onDismiss={dismissInstall} t={t} />}
      {showIOSHint  && !showInstall && <IOSHint onDismiss={dismissIOS} t={t} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
if (window.__yltLoaded) window.__yltLoaded();
</script>

<script>
// Service worker is registered only when served from a real origin (not blob/preview).
if ('serviceWorker' in navigator && location.protocol === 'https:' && !location.hostname.includes('claudeusercontent')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(r => console.log('YLT SW:', r.scope))
      .catch(e => console.warn('YLT SW failed:', e));
  });
}
</script>

</body>
</html>
